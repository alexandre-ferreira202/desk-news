<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeskNews Media Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0f0f12; --bg-secondary: #16161b; --bg-tertiary: #1e1e26;
    --bg-hover: #252530; --accent: #6366f1; --accent-dim: #4f52c4;
    --accent-glow: rgba(99,102,241,0.18); --green: #22c55e;
    --red: #ef4444; --text: #f3f4f6; --text-muted: #8e8e93; --border: #2c2c35;
  }
  body { background-color: var(--bg-primary); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; font-size: 13px; user-select: none; }
  .navbar { height: 48px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  .logo-area { display: flex; align-items: center; gap: 8px; font-weight: 700; color: #fff; }
  .logo-badge { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .nav-center-tabs { display: flex; gap: 4px; background: var(--bg-primary); padding: 4px; border-radius: 6px; border: 1px solid var(--border); }
  .nav-tab { padding: 4px 16px; border-radius: 4px; cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 500; }
  .nav-tab.active { background: var(--bg-tertiary); color: #fff; border: 1px solid var(--border); }
  .main-workspace { display: grid; grid-template-columns: 280px 1fr; height: calc(55vh - 48px); border-bottom: 1px solid var(--border); }
  .sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
  .import-zone { margin: 12px; padding: 16px; border: 2px dashed var(--border); border-radius: 8px; text-align: center; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; background: var(--bg-primary); }
  .import-zone:hover { border-color: var(--accent); color: #fff; background: var(--bg-hover); }
  .asset-list { flex: 1; overflow-y: auto; padding: 0 12px 12px 12px; display: flex; flex-direction: column; gap: 4px; }
  .asset-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--bg-tertiary); border-radius: 6px; border: 1px solid transparent; cursor: pointer; }
  .asset-item:hover { border-color: var(--border); background: var(--bg-hover); }
  .asset-icon { width: 32px; height: 32px; border-radius: 4px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid var(--border); }
  .asset-info { flex: 1; overflow: hidden; }
  .asset-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .asset-badge { font-size: 10px; font-weight: 700; padding: 2px 4px; border-radius: 3px; background: var(--border); color: var(--text-muted); }
  .asset-badge.vid { background: rgba(99,102,241,0.15); color: var(--accent); }
  .asset-badge.aud { background: rgba(34,197,94,0.15); color: var(--green); }
  .monitors-section { background: var(--bg-primary); overflow: hidden; }
  .timeline-container { height: 45vh; background: var(--bg-secondary); display: flex; flex-direction: column; position: relative; }
  .timeline-toolbar { height: 36px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--bg-secondary); }
  .timeline-tracks-area { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; background: #121214; }
  .track-row { display: grid; grid-template-columns: 140px 1fr; border-bottom: 1px solid var(--border); position: relative; }
  .track-label { background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 0 12px; display: flex; align-items: center; justify-content: space-between; font-weight: 500; font-size: 11px; color: var(--text-muted); z-index: 10; }
  .track-content { position: relative; height: 52px; background: #141417; }
  .track-row.ajuste-row .track-content { height: 40px; background: #111113; }
  .track-row.ajuste-row .track-label { height: 40px; }
  .timeline-block { position: absolute; height: calc(100% - 8px); top: 4px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; padding: 0 10px; cursor: move; overflow: hidden; }
  .timeline-block.active { border-color: #fff; box-shadow: 0 0 8px var(--accent-glow); }
  .block-title { font-weight: 500; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block-duration { font-size: 10px; opacity: 0.6; margin-top: 2px; }
  .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #6366f1; z-index: 40; pointer-events: none; }
  .playhead::before { content: ''; position: absolute; top: 0; left: -5px; width: 12px; height: 12px; background: #6366f1; border-radius: 50%; }
  .ruler { height: 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 140px 1fr; position: sticky; top: 0; z-index: 20; }
  .ruler-content { position: relative; width: 100%; height: 100%; overflow: hidden; }
  .ruler-tick { position: absolute; bottom: 0; width: 1px; height: 6px; background: var(--border); }
  .ruler-text { position: absolute; bottom: 8px; font-size: 9px; color: var(--text-muted); font-family: monospace; transform: translateX(-5px); }
  .statusbar { height: 28px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: var(--text-muted); gap: 16px; justify-content: space-between; }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #8e8e93; }
  .status-dot.playing { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .btn-action { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 11px; transition: all 0.2s; }
  .btn-action:hover { background: var(--bg-hover); border-color: var(--text-muted); }
  .btn-action.primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }
  .btn-action.primary:hover { background: var(--accent-dim); }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const FPS = 30;
const TOTAL_FRAMES = 1800; // 1 minuto

function formatTC(frames) {
  const f = frames % FPS;
  const totalSecs = Math.floor(frames / FPS); // Corrigido: Removida redeclaração
  const s = totalSecs % 60;
  const m = Math.floor(totalSecs / 60) % 60;
  const h = Math.floor(totalSecs / 3600);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(f).padStart(2,'0')}`;
}

function App() {
  const [assets, setAssets] = useState([]);
  const [tracks, setTracks] = useState({
    ajuste: [],
    v2: [],
    v1: [],
    a1: [],
    a2: []
  });
  const [frame, setFrame] = useState(0);
  const [zoom, setZoom] = useState(1.0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [selectedClip, setSelectedClip] = useState(null);
  const [activeTool, setActiveTool] = useState('select'); // select, razor
  const [sourceAsset, setSourceAsset] = useState(null);
  const [sourceIsPlaying, setSourceIsPlaying] = useState(false);

  const fileInputRef = useRef(null);
  const programVideoRef = useRef(null);
  const sourceVideoRef = useRef(null);
  const frameRef = useRef(0);
  frameRef.current = frame;

  // Gerenciamento de teclas de atalho
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (document.activeElement.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        setIsPlaying(prev => !prev);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        seek(frameRef.current + (e.shiftKey ? FPS : 1));
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        seek(frameRef.current - (e.shiftKey ? FPS : 1));
      } else if (e.code === 'KeyC') {
        setActiveTool('razor');
      } else if (e.code === 'KeyV') {
        setActiveTool('select');
      } else if (e.code === 'Delete' || e.code === 'Backspace') {
        if (selectedClip) deleteClip(selectedClip);
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [selectedClip]);

  // Loop de Reprodução do Programa
  useEffect(() => {
    let animId;
    if (isPlaying) {
      if (programVideoRef.current && programVideoRef.current.src) {
        programVideoRef.current.play().catch(() => {});
      }
      const lastTime = performance.now();
      const loop = () => {
        setFrame(prev => {
          const next = prev + 1;
          if (next >= TOTAL_FRAMES) {
            setIsPlaying(false);
            return 0;
          }
          return next;
        });
        animId = requestAnimationFrame(loop);
      };
      animId = requestAnimationFrame(loop);
    } else {
      if (programVideoRef.current) {
        programVideoRef.current.pause();
      }
    }
    return () => cancelAnimationFrame(animId);
  }, [isPlaying]);

  // Sincronizar Vídeo do Programa com o Frame Atual
  useEffect(() => {
    if (!isPlaying && programVideoRef.current) {
      programVideoRef.current.currentTime = frame / FPS;
    }
  }, [frame, isPlaying]);

  const seek = (f) => {
    const bounded = Math.max(0, Math.min(TOTAL_FRAMES - 1, f));
    setFrame(bounded);
  };

  // Importação Real de Mídias
  const handleFileImport = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      const isVideo = file.type.includes('video');
      const isAudio = file.type.includes('audio');
      const isImage = file.type.includes('image');
      
      let type = 'GFX';
      if (isVideo) type = 'VID';
      if (isAudio) type = 'AUD';
      if (isImage) type = 'IMG';

      const newAsset = {
        id: 'asset_' + Math.random().toString(36).substr(2,9),
        name: file.name,
        type: type,
        url: url,
        duration: 10 // Padrão simulado caso não consiga ler instantaneamente
      };

      if (isVideo || isAudio) {
        const tempEl = document.createElement(isVideo ? 'video' : 'audio');
        tempEl.src = url;
        tempEl.onloadedmetadata = () => {
          newAsset.duration = tempEl.duration;
          setAssets(prev => [...prev, newAsset]);
        };
      } else {
        setAssets(prev => [...prev, newAsset]);
      }
    });
  };

  // Duplo Clique: Abre Mídia no Monitor de Corte (Source)
  const handleAssetDoubleClick = (asset) => {
    setSourceAsset(asset);
    setSourceIsPlaying(false);
    if (sourceVideoRef.current) {
      sourceVideoRef.current.src = asset.url;
      sourceVideoRef.current.load();
    }
  };

  const toggleSourcePlay = () => {
    if (!sourceVideoRef.current || !sourceAsset) return;
    if (sourceIsPlaying) {
      sourceVideoRef.current.pause();
      setSourceIsPlaying(false);
    } else {
      sourceVideoRef.current.play().catch(() => {});
      setSourceIsPlaying(true);
    }
  };

  // Inserção Direta na Timeline na Agulha do Programa
  const insertAssetToTimeline = (asset) => {
    const startFrame = frame;
    const durationFrames = Math.round(asset.duration * FPS);
    const clipId = 'clip_' + Math.random().toString(36).substr(2,9);
    const linkId = 'link_' + Math.random().toString(36).substr(2,9);

    setTracks(prev => {
      const next = { ...prev };
      
      if (asset.type === 'VID') {
        // Insere Vídeo em V1 e Áudio Vinculado em A1
        next.v1 = [...next.v1, { clipId, assetId: asset.id, name: asset.name, startFrame, durationFrames, type: 'video', url: asset.url, linkId }];
        next.a1 = [...next.a1, { clipId: 'audio_' + clipId, assetId: asset.id, name: '[Áudio] ' + asset.name, startFrame, durationFrames, type: 'audio', url: asset.url, linkId }];
      } else if (asset.type === 'AUD') {
        next.a1 = [...next.a1, { clipId, assetId: asset.id, name: asset.name, startFrame, durationFrames, type: 'audio', url: asset.url }];
      } else {
        next.v1 = [...next.v1, { clipId, assetId: asset.id, name: asset.name, startFrame, durationFrames, type: 'image', url: asset.url }];
      }
      return next;
    });
  };

  const deleteClip = (clip) => {
    setTracks(prev => {
      const next = { ...prev };
      Object.keys(next).forEach(trackKey => {
        next[trackKey] = next[trackKey].filter(c => c.clipId !== clip.clipId && (!clip.linkId || c.linkId !== clip.linkId));
      });
      return next;
    });
    setSelectedClip(null);
  };

  const splitClip = (trackKey, clipId, splitPointFrame) => {
    setTracks(prev => {
      const next = { ...prev };
      const track = next[trackKey];
      const clipIdx = track.findIndex(c => c.clipId === clipId);
      if (clipIdx === -1) return prev;

      const clip = track[clipIdx];
      const relativeSplit = splitPointFrame - clip.startFrame;

      if (relativeSplit <= 0 || relativeSplit >= clip.durationFrames) return prev;

      const leftClip = { ...clip, durationFrames: relativeSplit };
      const rightClip = {
        ...clip,
        clipId: 'clip_' + Math.random().toString(36).substr(2,9),
        startFrame: splitPointFrame,
        durationFrames: clip.durationFrames - relativeSplit
      };

      track.splice(clipIdx, 1, leftClip, rightClip);
      return next;
    });
  };

  // Encontra o clipe de vídeo ativo sob a agulha atual para renderizar o frame correto
  const currentVideoUrl = useMemo(() => {
    const allVideoClips = [...tracks.v1, ...tracks.v2];
    const active = allVideoClips.find(c => frame >= c.startFrame && frame < (c.startFrame + c.durationFrames));
    return active ? active.url : null;
  }, [tracks, frame]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      {/* Barra de Navegação */}
      <div className="navbar">
        <div className="logo-area">
          <div className="logo-badge">DN</div>
          <span>DeskNews Media Editor</span>
          <span style={{ color: 'var(--text-muted)', fontSize: '11px', fontWeight: 'normal' }}>· SIMPLIFIED-VLOG</span>
        </div>
        <div className="nav-center-tabs">
          <div className="nav-tab">Arquivo</div>
          <div className="nav-tab active">Editar</div>
          <div className="nav-tab">Sequência</div>
          <div className="nav-tab">Efeitos</div>
        </div>
        <div style={{ display: 'flex', gap: '8px' }}>
          <button className="btn-action primary">Exportar</button>
        </div>
      </div>

      {/* Workspace Principal */}
      <div className="main-workspace">
        <div className="sidebar">
          <div className="sidebar-header">
            <span>Arquivos do Projeto</span>
            <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{assets.length} itens</span>
          </div>
          <div className="import-zone" onClick={() => fileInputRef.current.click()}>
            <div style={{ fontSize: '24px', marginBottom: '6px' }}>📁</div>
            <span>Arraste arquivos ou clique para importar</span>
            <input type="file" ref={fileInputRef} onChange={handleFileImport} multiple accept="video/*,audio/*,image/*" style={{ display: 'none' }} />
          </div>

          <div className="asset-list">
            {assets.map(asset => (
              <div key={asset.id} className="asset-item" onDoubleClick={() => handleAssetDoubleClick(asset)}>
                <div className="asset-icon">
                  {asset.type === 'VID' && '🎬'}
                  {asset.type === 'AUD' && '🎵'}
                  {asset.type === 'IMG' && '🖼️'}
                </div>
                <div className="asset-info">
                  <div className="asset-name">{asset.name}</div>
                  <div className="asset-meta">{asset.type === 'IMG' ? 'Estático' : formatTC(Math.round(asset.duration * FPS))}</div>
                </div>
                <div className={`asset-badge ${asset.type.toLowerCase()}`}>{asset.type}</div>
                <button onClick={(e) => { e.stopPropagation(); insertAssetToTimeline(asset); }} style={{ background: 'var(--accent)', border: 'none', color: 'white', borderRadius: '4px', padding: '2px 6px', cursor: 'pointer', fontSize: '10px' }}>+</button>
              </div>
            ))}
          </div>
        </div>

        {/* ÁREA DOS DOIS MONITORES LADO A LADO */}
        <div className="monitors-section" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', padding: '16px', background: 'var(--bg-primary)' }}>
          
          {/* MONITOR DE CORTE (SOURCE) - ESQUERDA */}
          <div style={{ background: 'var(--bg-secondary)', borderRadius: '8px', padding: '12px', border: '1px solid var(--border)', display: 'flex', flexDirection: 'column' }}>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: '600', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Monitor de Corte (Source)</div>
            <div style={{ position: 'relative', flex: 1, backgroundColor: '#000', borderRadius: '4px', display: 'flex', alignItems: 'center', justify-content: 'center', overflow: 'hidden', minHeight: '200px' }}>
              <video ref={sourceVideoRef} style={{ width: '100%', height: '100%', objectFit: 'contain', display: sourceAsset && sourceAsset.type === 'VID' ? 'block' : 'none' }} controls={false} />
              {!sourceAsset && <div style={{ color: 'var(--text-muted)', fontSize: '12px', textAlign: 'center', padding: '20px' }}>Duplo clique em uma mídia lateral para cortar</div>}
              {sourceAsset && sourceAsset.type === 'AUD' && <div style={{ color: 'var(--green)', fontSize: '13px', fontWeight: '500' }}>🎵 {sourceAsset.name}</div>}
            </div>
            <div style={{ display: 'flex', gap: '8px', marginTop: '8px', justifyContent: 'center' }}>
              <button className="btn-action" onClick={toggleSourcePlay}>{sourceIsPlaying ? 'Pausar' : 'Reproduzir Fonte'}</button>
            </div>
          </div>

          {/* MONITOR DE LINHA DO TEMPO (PROGRAM) - DIREITA */}
          <div style={{ background: 'var(--bg-secondary)', borderRadius: '8px', padding: '12px', border: '1px solid var(--border)', display: 'flex', flexDirection: 'column' }}>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: '600', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Monitor de Linha do Tempo (Program)</div>
            <div style={{ position: 'relative', flex: 1, backgroundColor: '#000', borderRadius: '4px', display: 'flex', alignItems: 'center', justify-content: 'center', overflow: 'hidden', minHeight: '200px' }}>
              {currentVideoUrl ? (
                <video ref={programVideoRef} src={currentVideoUrl} style={{ width: '100%', height: '100%', objectFit: 'contain' }} controls={false} muted />
              ) : (
                <div style={{ color: '#444', fontSize: '32px' }}>📺</div>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '8px' }}>
              <div style={{ display: 'flex', gap: '4px' }}>
                <button className={`btn-action ${isPlaying?'primary':''}`} onClick={() => setIsPlaying(!isPlaying)}>{isPlaying?'⏸ Pause':'▶ Play'}</button>
              </div>
              <span style={{ color: 'var(--accent)', fontFamily: 'monospace', fontWeight: '600', fontSize: '14px' }}>{formatTC(frame)}</span>
            </div>
          </div>

        </div>
      </div>

      {/* LINHA DO TEMPO REORGANIZADA (V1 COLADA NA A1) */}
      <div className="timeline-container">
        <div className="timeline-toolbar">
          <div style={{ display: 'flex', gap: '6px' }}>
            <button className={`btn-action ${activeTool==='select'?'primary':''}`} onClick={() => setActiveTool('select')}>Selectionar (V)</button>
            <button className={`btn-action ${activeTool==='razor'?'primary':''}`} onClick={() => setActiveTool('razor')}>Navalha (C)</button>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Zoom:</span>
            <input type="range" min="0.5" max="3" step="0.1" value={zoom} onChange={(e) => setZoom(parseFloat(e.target.value))} style={{ width: '80px', accentColor: 'var(--accent)' }} />
          </div>
        </div>

        <div className="timeline-tracks-area" onScroll={(e) => {
          document.getElementById('ruler-scroll').scrollLeft = e.target.scrollLeft;
        }}>
          {/* Régua de Tempo */}
          <div className="ruler">
            <div className="track-label" style={{ height: '24px', borderBottom: '1px solid var(--border)' }}>Tempo</div>
            <div id="ruler-scroll" style={{ overflow: 'hidden', position: 'relative' }}>
              <div style={{ width: `${TOTAL_FRAMES * 4 * zoom}px`, height: '100%' }} onClick={(e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                seek(Math.round(clickX / (4 * zoom)));
              }}>
                {Array.from({ length: Math.ceil(TOTAL_FRAMES / FPS) }).map((_, i) => (
                  <div key={i} style={{ position: 'absolute', left: `${i * FPS * 4 * zoom}px`, bottom: 0, height: '100%' }}>
                    <div className="ruler-tick" />
                    <span className="ruler-text">{formatTC(i * FPS).substring(3,8)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Agulha Azul (Playhead) */}
          <div className="playhead" style={{ left: `${140 + frame * 4 * zoom}px` }} />

          {/* ESTRUTURA ERGONÔMICA DE TRILHAS */}
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            
            {/* Camada de Ajuste */}
            <div className="track-row ajuste-row">
              <div className="track-label">CAMADA AJUSTE</div>
              <div className="track-content" style={{ width: `${TOTAL_FRAMES * 4 * zoom}px` }}>
                {tracks.ajuste.map(clip => (
                  <div key={clip.clipId} className={`timeline-block ${selectedClip?.clipId === clip.clipId ? 'active' : ''}`} style={{ left: `${clip.startFrame * 4 * zoom}px`, width: `${clip.durationFrames * 4 * zoom}px`, background: 'purple' }} onClick={() => setSelectedClip(clip)}>
                    <span className="block-title">{clip.name}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Faixa Vídeo 2 */}
            <div className="track-row">
              <div className="track-label">V2</div>
              <div className="track-content" style={{ width: `${TOTAL_FRAMES * 4 * zoom}px` }}>
                {tracks.v2.map(clip => (
                  <div key={clip.clipId} className={`timeline-block ${selectedClip?.clipId === clip.clipId ? 'active' : ''}`} style={{ left: `${clip.startFrame * 4 * zoom}px`, width: `${clip.durationFrames * 4 * zoom}px`, background: '#2e3142' }} onClick={() => setSelectedClip(clip)}>
                    <span className="block-title">{clip.name}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Faixa Vídeo 1 (Colada na Linha Central e perto da A1) */}
            <div className="track-row" style={{ borderBottom: '2px solid var(--accent)' }}>
              <div className="track-label" style={{ color: '#fff' }}>V1 (Principal)</div>
              <div className="track-content" style={{ width: `${TOTAL_FRAMES * 4 * zoom}px`, background: '#17171c' }}>
                {tracks.v1.map(clip => (
                  <div key={clip.clipId} className={`timeline-block ${selectedClip?.clipId === clip.clipId ? 'active' : ''}`} style={{ left: `${clip.startFrame * 4 * zoom}px`, width: `${clip.durationFrames * 4 * zoom}px`, background: 'rgba(99,102,241,0.35)', border: '1px solid var(--accent)' }} onClick={() => {
                    if (activeTool === 'razor') {
                      splitClip('v1', clip.clipId, frame);
                    } else {
                      setSelectedClip(clip);
                    }
                  }}>
                    <span className="block-title">{clip.name}</span>
                    <span className="block-duration">{formatTC(clip.durationFrames)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Faixa Áudio 1 (Diretamente colada abaixo da V1) */}
            <div className="track-row">
              <div className="track-label" style={{ color: '#fff' }}>A1 (Principal)</div>
              <div className="track-content" style={{ width: `${TOTAL_FRAMES * 4 * zoom}px`, background: '#17171c' }}>
                {tracks.a1.map(clip => (
                  <div key={clip.clipId} className={`timeline-block ${selectedClip?.clipId === clip.clipId ? 'active' : ''}`} style={{ left: `${clip.startFrame * 4 * zoom}px`, width: `${clip.durationFrames * 4 * zoom}px`, background: 'rgba(34,197,94,0.2)', border: '1px solid var(--green)' }} onClick={() => setSelectedClip(clip)}>
                    <span className="block-title">{clip.name}</span>
                    <span className="block-duration">{formatTC(clip.durationFrames)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Faixa Áudio 2 */}
            <div className="track-row">
              <div className="track-label">A2 (Efeitos/Trilha)</div>
              <div className="track-content" style={{ width: `${TOTAL_FRAMES * 4 * zoom}px` }}>
                {tracks.a2.map(clip => (
                  <div key={clip.clipId} className={`timeline-block ${selectedClip?.clipId === clip.clipId ? 'active' : ''}`} style={{ left: `${clip.startFrame * 4 * zoom}px`, width: `${clip.durationFrames * 4 * zoom}px`, background: '#1c2d22' }} onClick={() => setSelectedClip(clip)}>
                    <span className="block-title">{clip.name}</span>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      </div>

      {/* Status Bar */}
      <div className="statusbar">
        <div className="status-item"><div className={`status-dot ${isPlaying?'playing':''}`}/>{isPlaying?'Reproduzindo':'Pronto'}</div>
        <div className="status-item">Sequência: SIMPLIFIED-VLOG · {FPS}fps</div>
        <div className="status-item">Posição: {formatTC(frame)}</div>
        <div className="status-item" style={{color:'var(--accent)'}}>Ferramenta: {activeTool === 'select' ? 'Seleção (V)' : 'Navalha (C)'}</div>
        <div className="status-item">[Espaço] Play · [←→] Mover Agulha · [C] Cortar · [Del] Excluir</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
