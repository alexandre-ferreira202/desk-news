<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0f0f12; --bg-secondary: #16161b; --bg-tertiary: #1e1e26;
    --bg-hover: #252530; --accent: #6366f1; --accent-dim: #4f52c4;
    --accent-glow: rgba(99,102,241,0.18); --green: #22c55e; --red: #ef4444;
    --text: #f3f4f6; --text-muted: #8e8e93; --border: #2c2c35;
  }
  body { background-color: var(--bg-primary); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; font-size: 13px; user-select: none; }

  /* ─── NAVBAR ─── */
  .navbar { height: 44px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; gap: 12px; }
  .logo-area { display: flex; align-items: center; gap: 8px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .logo-badge { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .navbar-center { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; flex-wrap: wrap; }
  .pill { display: flex; align-items: center; gap: 4px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .pill:hover { border-color: var(--accent); color: #fff; }
  .pill.active { background: rgba(99,102,241,0.18); border-color: var(--accent); color: var(--accent); }
  .pill.snap-on { background: rgba(34,197,94,0.12); border-color: var(--green); color: var(--green); }

  /* ─── MAIN WORKSPACE ─── */
  .main-workspace { display: grid; grid-template-columns: 260px 1fr; height: calc(54vh - 44px); border-bottom: 1px solid var(--border); }

  /* ─── SIDEBAR / BIN ─── */
  .sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 12px; gap: 6px; }
  .btn-sm { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .import-zone { margin: 8px 10px; padding: 10px; border: 2px dashed var(--border); border-radius: 6px; text-align: center; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .import-zone:hover { border-color: var(--accent); color: #fff; }
  .bin-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; display: flex; flex-direction: column; gap: 2px; }
  .bin-header { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .bin-header:hover { background: var(--bg-hover); color: #fff; }
  .bin-header .chevron { font-size: 9px; transition: transform 0.15s; }
  .bin-header .chevron.open { transform: rotate(90deg); }
  .bin-assets { padding-left: 14px; display: flex; flex-direction: column; gap: 2px; }
  .asset-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--bg-tertiary); border-radius: 5px; border: 1px solid transparent; cursor: pointer; }
  .asset-item:hover { border-color: var(--border); background: var(--bg-hover); }
  .asset-icon { width: 26px; height: 26px; border-radius: 3px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid var(--border); flex-shrink: 0; }
  .asset-info { flex: 1; overflow: hidden; }
  .asset-name { font-weight: 500; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-badge { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; background: var(--border); color: var(--text-muted); }
  .asset-badge.vid { background: rgba(99,102,241,0.15); color: var(--accent); }
  .asset-badge.aud { background: rgba(34,197,94,0.15); color: var(--green); }

  /* ─── MONITORS ─── */
  .monitors-section { background: var(--bg-primary); overflow: hidden; padding: 12px; gap: 12px; display: grid; grid-template-columns: 1fr 1fr; }
  .panel-container { background: var(--bg-secondary); border-radius: 8px; padding: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; }
  .panel-container.focused { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .source-scrubber { width: 100%; appearance: none; background: transparent; cursor: pointer; outline: none; margin: 6px 0; }
  .source-scrubber::-webkit-slider-runnable-track { width: 100%; height: 3px; background: var(--border); border-radius: 2px; }
  .source-scrubber::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin-top: -3.5px; }

  /* ─── TIMELINE ─── */
  .timeline-container { height: 46vh; background: var(--bg-secondary); display: flex; flex-direction: column; }
  .timeline-toolbar { height: 34px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
  .timeline-layout { display: grid; grid-template-columns: 44px 1fr 44px; flex: 1; overflow: hidden; }
  .toolbox-vertical { background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 6px 0; gap: 4px; z-index: 30; }
  .tool-btn { width: 28px; height: 28px; border-radius: 5px; border: 1px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; }
  .tool-btn:hover { background: var(--bg-hover); color: #fff; }
  .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .tool-divider { width: 20px; height: 1px; background: var(--border); margin: 2px 0; }

  /* ─── VU METER ─── */
  .vu-panel {
    background: var(--bg-secondary); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 6px 0 4px;
    gap: 3px; overflow: hidden;
  }
  .vu-label { font-size: 8px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; writing-mode: vertical-rl; transform: rotate(180deg); margin-bottom: 2px; }
  .vu-meters { display: flex; gap: 2px; flex: 1; align-items: flex-end; width: 100%; padding: 0 4px; justify-content: center; }
  .vu-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; height: 100%; justify-content: flex-end; }
  .vu-bar-track { flex: 1; width: 8px; background: var(--bg-primary); border-radius: 3px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; position: relative; }
  .vu-bar-fill { width: 100%; border-radius: 2px; transition: height 0.06s ease-out; }
  .vu-bar-fill.ch-l { background: linear-gradient(to top, #22c55e 0%, #86efac 60%, #facc15 80%, #ef4444 100%); }
  .vu-bar-fill.ch-r { background: linear-gradient(to top, #14b8a6 0%, #5eead4 60%, #facc15 80%, #ef4444 100%); }
  .vu-ch-label { font-size: 7px; color: var(--text-muted); font-weight: 700; }
  .vu-scale { position: absolute; top: 0; right: 0; width: 4px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
  .vu-tick { width: 3px; height: 1px; background: rgba(255,255,255,0.15); }
  .vu-clip-led { width: 8px; height: 4px; border-radius: 1px; background: var(--border); margin-bottom: 1px; transition: background 0.1s; flex-shrink: 0; }
  .vu-clip-led.clipping { background: #ef4444; box-shadow: 0 0 4px #ef4444; }

  /* ─── GAIN WINDOW ─── */
  .gain-window {
    position: fixed; z-index: 9999;
    background: var(--bg-secondary); border: 1px solid var(--accent);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px var(--accent-glow);
    padding: 14px 18px; min-width: 230px;
    display: flex; flex-direction: column; gap: 10px;
    user-select: none;
  }
  .gain-window-title { font-size: 11px; font-weight: 700; color: var(--accent); display: flex; align-items: center; justify-content: space-between; }
  .gain-window-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 3px; }
  .gain-window-close:hover { color: var(--red); background: rgba(239,68,68,0.1); }
  .gain-db-display { font-family: monospace; font-size: 24px; font-weight: 700; color: var(--text); text-align: center; letter-spacing: 1px; }
  .gain-db-display span { font-size: 13px; color: var(--text-muted); margin-left: 3px; }
  .gain-slider-wrap { display: flex; align-items: center; gap: 8px; }
  .gain-slider-label { font-size: 10px; color: var(--text-muted); width: 28px; text-align: right; flex-shrink: 0; }
  .gain-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
  .gain-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 6px var(--accent-glow); }
  .gain-presets { display: flex; gap: 5px; flex-wrap: wrap; }
  .gain-preset-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-muted); border-radius: 4px; padding: 3px 8px; font-size: 10px; cursor: pointer; }
  .gain-preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .gain-footer { font-size: 9px; color: var(--border); text-align: center; }

  /* ─── TRANSITIONS ─── */
  .transition-block {
    position: absolute; top: 0; height: 100%; z-index: 6; pointer-events: none;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .transition-block.video-dissolve {
    background: linear-gradient(to right, rgba(99,102,241,0), rgba(99,102,241,0.55), rgba(99,102,241,0));
    border-left: 1px solid rgba(99,102,241,0.7); border-right: 1px solid rgba(99,102,241,0.7);
  }
  .transition-block.audio-crossfade {
    background: linear-gradient(to right, rgba(34,197,94,0), rgba(34,197,94,0.45), rgba(34,197,94,0));
    border-left: 1px solid rgba(34,197,94,0.6); border-right: 1px solid rgba(34,197,94,0.6);
  }
  .transition-label { font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.85); text-shadow: 0 1px 3px rgba(0,0,0,0.9); white-space: nowrap; pointer-events: none; }

  .timeline-tracks-area { position: relative; overflow: auto; background: #121214; flex: 1; }

  /* ─── TRACK ROWS ─── */
  .track-row { display: grid; grid-template-columns: 110px 1fr; border-bottom: 1px solid var(--border); }
  .track-label { background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 0 10px; display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 11px; z-index: 10; position: sticky; left: 0; }
  .track-label .track-id { font-family: monospace; font-size: 12px; }
  .track-content { position: relative; height: 32px; }
  .track-content.razor-cur { cursor: crosshair; }
  .track-content.drop-eligible { background-blend-mode: overlay; }
  .track-content.locked { cursor: not-allowed; }
  .track-content.locked::after { content:''; position:absolute; inset:0; background: repeating-linear-gradient(45deg, rgba(0,0,0,0.18) 0 6px, transparent 6px 12px); pointer-events:none; }
  .lock-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; margin-left: auto; padding: 1px 3px; border-radius: 3px; opacity: 0.55; line-height: 1; }
  .lock-btn:hover { opacity: 1; background: var(--bg-hover); }
  .lock-btn.locked { opacity: 1; color: #fbbf24; }

  /* ─── CLIP BLOCKS ─── */
  .timeline-block { position: absolute; height: calc(100% - 6px); top: 3px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: center; padding: 0 8px; overflow: hidden; transition: box-shadow 0.1s; }
  .timeline-block.can-drag { cursor: move; }
  .timeline-block.razor-cur { cursor: crosshair; }
  .timeline-block.slip-cur { cursor: ew-resize; }
  .timeline-block.slide-cur { cursor: col-resize; }
  .timeline-block.active { border-color: #fff !important; box-shadow: 0 0 0 1px #fff, 0 0 10px var(--accent-glow); z-index: 5; }
  .timeline-block.multi-selected { border-color: #fbbf24 !important; box-shadow: 0 0 0 1px #fbbf24, 0 0 8px rgba(251,191,36,0.4); z-index: 5; }
  .timeline-block.grouped::after { content:''; position:absolute; inset:1px; border:1px dashed rgba(255,255,255,0.45); border-radius:3px; pointer-events:none; }
  .timeline-block.drop-target { box-shadow: 0 0 0 2px var(--green) !important; }
  .timeline-block.drop-preview { box-shadow: 0 0 0 2px #a5b4fc !important; opacity: 0.55; border-style: dashed; }
  .block-title { font-weight: 500; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 2; position: relative; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }

  /* ─── RULER / PLAYHEAD ─── */

  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #555; flex-shrink: 0; }

  .pan-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #e2e8f0; border-radius: 50%; cursor: grab; }

  /* ─── RULER METRIC ─── */
  .ruler { height: 38px !important; }
  .ruler-metric-bar { height: 16px; background: #0a0a10; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 110px 1fr; position: relative; }
  .ruler-timecode-bar { height: 22px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 110px 1fr; }
  .ruler-in-marker { position: absolute; top: 0; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid var(--green); transform: translateX(-6px); z-index: 25; cursor: pointer; }
  .ruler-out-marker { position: absolute; top: 0; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid var(--red); transform: translateX(-6px); z-index: 25; cursor: pointer; }

  .trans-win-header { padding:10px 14px; background:linear-gradient(135deg,#1a1a2e,#16213e); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; cursor:grab; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const FPS = 30;
const TOTAL_FRAMES = 216000;

// V3→V1 top, A1→A3 bottom
const TRACK_DEFS = [
  { key: 'v3', id: 'V3', type: 'video', color: 'rgba(139,92,246,0.32)', border: '#8b5cf6', bg: '#16141c' },
  { key: 'v2', id: 'V2', type: 'video', color: 'rgba(99,102,241,0.28)', border: '#6366f1', bg: '#141419' },
  { key: 'v1', id: 'V1', type: 'video', color: 'rgba(99,102,241,0.42)', border: '#818cf8', bg: '#17171f' },
  { key: 'a1', id: 'A1', type: 'audio', color: 'rgba(34,197,94,0.22)',  border: '#22c55e', bg: '#141814' },
  { key: 'a2', id: 'A2', type: 'audio', color: 'rgba(20,184,166,0.22)', border: '#14b8a6', bg: '#141817' },
  { key: 'a3', id: 'A3', type: 'audio', color: 'rgba(251,191,36,0.18)', border: '#fbbf24', bg: '#181714' },
];
const REAL_TRACKS = TRACK_DEFS;
const VIDEO_TRACKS = ['v1','v2','v3'];
const AUDIO_TRACKS = ['a1','a2','a3'];

function uid() { return Math.random().toString(36).substr(2, 9); }
function formatTC(frames) {
  const f = Math.floor(Math.abs(frames)) % FPS;
  const totalSecs = Math.floor(Math.abs(frames) / FPS);
  const s = totalSecs % 60, m = Math.floor(totalSecs / 60) % 60, h = Math.floor(totalSecs / 3600);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(f).padStart(2,'0')}`;
}

/* ─── BinPanel ─── */
function BinPanel({ bins, assets, onImport, onAssetDblClick, onInsert, onCreateBin, onDeleteAssets, onNewTimeline }) {
  const [expanded, setExpanded] = useState({});
  const [selectedAssets, setSelectedAssets] = useState(new Set());
  const fileRef = useRef(null);

  const toggle = id => setExpanded(p => ({ ...p, [id]: !p[id] }));
  const toggleAsset = (id, e) => {
    e.stopPropagation();
    setSelectedAssets(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };

  const renderAsset = (asset) => (
    <div key={asset.id}
      className="asset-item"
      style={{ outline: selectedAssets.has(asset.id) ? '1px solid var(--accent)' : 'none', background: selectedAssets.has(asset.id) ? 'rgba(99,102,241,0.12)' : '' }}
      onClick={e => toggleAsset(asset.id, e)}
      onDoubleClick={() => onAssetDblClick(asset)}
      draggable
      onDragStart={e => { e.dataTransfer.setData('application/x-bin-asset', asset.id); e.dataTransfer.effectAllowed = 'copy'; }}>
      <div className="asset-icon">{asset.type === 'VID' ? '🎬' : asset.type === 'AUD' ? '🎵' : '🖼️'}</div>
      <div className="asset-info">
        <div className="asset-name">{asset.name}</div>
        <span className={`asset-badge ${asset.type === 'VID' ? 'vid' : asset.type === 'AUD' ? 'aud' : ''}`}>{asset.type}</span>
      </div>
      <button onClick={e => { e.stopPropagation(); onInsert(asset); }}
        style={{ background:'var(--accent)', border:'none', color:'white', borderRadius:'3px', padding:'2px 5px', cursor:'pointer', fontSize:'11px', flexShrink:0 }}>+</button>
    </div>
  );

  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <span>Arquivos de Mídia</span>
        <div style={{ display:'flex', gap:'4px', marginLeft:'auto' }}>
          {/* Clipboard / New Timeline icon */}
          <button className="btn-sm" title="Nova Timeline (arraste uma pasta aqui)" onClick={() => onNewTimeline('Nova Timeline', [])}
            onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor='var(--accent)'; e.currentTarget.style.color='var(--accent)'; }}
            onDragLeave={e => { e.currentTarget.style.borderColor=''; e.currentTarget.style.color=''; }}
            onDrop={e => {
              e.preventDefault(); e.currentTarget.style.borderColor=''; e.currentTarget.style.color='';
              const binId = e.dataTransfer.getData('application/x-bin-folder');
              if (binId) { onNewTimeline(null, binId); }
            }}
            style={{ padding:'2px 6px', fontSize:'13px', lineHeight:1 }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" strokeWidth="1.2" fill="none"/>
              <path d="M5 3V2a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
              <path d="M5 7h6M5 10h4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
          </button>
          {/* Folder / New Bin icon */}
          <button className="btn-sm" title="Nova Bin" onClick={onCreateBin} style={{ padding:'2px 6px', fontSize:'13px', lineHeight:1 }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 3.5A1.5 1.5 0 012.5 2h3.086a1 1 0 01.707.293L7.5 3.5H13.5A1.5 1.5 0 0115 5v7a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12V3.5z" stroke="currentColor" strokeWidth="1.2" fill="none"/>
              <path d="M8 7v4M6 9h4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
          </button>
          {/* Trash icon - delete selected assets */}
          <button className="btn-sm" title="Apagar selecionados"
            disabled={selectedAssets.size === 0}
            style={{ padding:'2px 6px', fontSize:'13px', lineHeight:1, opacity: selectedAssets.size === 0 ? 0.35 : 1, color: selectedAssets.size > 0 ? 'var(--red)' : 'var(--text-muted)' }}
            onClick={() => { onDeleteAssets([...selectedAssets]); setSelectedAssets(new Set()); }}>
            <svg width="13" height="14" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 3.5h12M5 3.5V2h4v1.5M2.5 3.5l.75 10A1 1 0 004.25 14.5h5.5a1 1 0 001-.95L11.5 3.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
              <path d="M5.5 6.5v5M8.5 6.5v5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div className="import-zone" onClick={() => fileRef.current.click()}>
        <div style={{ fontSize: '20px', marginBottom: '4px' }}>📁</div>
        <span>Clique para importar</span>
        <input type="file" ref={fileRef} onChange={onImport} multiple accept="video/*,audio/*,image/*" style={{ display: 'none' }} />
      </div>
      <div className="bin-list">
        {bins.map(bin => {
          const binAssets = assets.filter(a => a.binId === bin.id);
          const isOpen = expanded[bin.id] !== false;
          return (
            <div key={bin.id}>
              <div className="bin-header" onClick={() => toggle(bin.id)}
                draggable
                onDragStart={e => { e.dataTransfer.setData('application/x-bin-folder', bin.id); e.dataTransfer.effectAllowed = 'copy'; }}>
                <span className="chevron" style={{ transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', display:'inline-block', transition:'transform 0.15s' }}>▶</span>
                <span>📂 {bin.name}</span>
                <span style={{ marginLeft:'auto', fontSize:'9px', color:'var(--border)' }}>{binAssets.length}</span>
              </div>
              {isOpen && (
                <div className="bin-assets">
                  {binAssets.length === 0 && (
                    <div style={{ fontSize:'10px', color:'var(--border)', padding:'4px 8px' }}>Vazia</div>
                  )}
                  {binAssets.map(renderAsset)}
                </div>
              )}
            </div>
          );
        })}
        {assets.filter(a => !a.binId).map(renderAsset)}
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const initTracks = {};
  REAL_TRACKS.forEach(t => { initTracks[t.key] = []; });

  // State
  const [bins, setBins] = useState([{ id: 'default', name: 'Geral' }]);
  const [assets, setAssets] = useState([]);
  const [tracks, setTracks] = useState(initTracks);
  const [frame, setFrame] = useState(0.0);
  const [zoom, setZoom] = useState(1.0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [playbackSpeed, setPlaybackSpeed] = useState(1);
  const [activeTool, setActiveTool] = useState('select');
  const [selectedClip, setSelectedClip] = useState(null);
  const [dragInfo, setDragInfo] = useState(null);
  const [snapEnabled, setSnapEnabled] = useState(true);
  const [linkedSelection, setLinkedSelection] = useState(true);
  const [tlIn, setTlIn] = useState(null);
  const [tlOut, setTlOut] = useState(null);
  const [srcIn, setSrcIn] = useState(null);
  const [srcOut, setSrcOut] = useState(null);
  const [sourceAsset, setSourceAsset] = useState(null);
  const [sourceFrame, setSourceFrame] = useState(0.0);
  const [sourceDur, setSourceDur] = useState(1);
  const [srcPlaying, setSrcPlaying] = useState(false);
  const [focusedPanel, setFocusedPanel] = useState('timeline');
  const [snapLineX, setSnapLineX] = useState(null); // pixel x for snap visual
  const [selectedClips, setSelectedClips] = useState([]); // multi-select: [{clipId, trackKey}]
  const [groups, setGroups] = useState([]); // array of arrays of clipId
  const [sourceDragActive, setSourceDragActive] = useState(false);
  const [lockedTracks, setLockedTracks] = useState({}); // { v1: true, a2: true, ... }
  const [marquee, setMarquee] = useState(null); // {x0,y0,x1,y1} in tracks-area-local coords, screen-space px
  const [dropPreview, setDropPreview] = useState(null); // { trackKey, frame }

  // Gain window
  const [gainWindow, setGainWindow] = useState(null); // { clipId, trackKey, db, x, y }
  const [gainInputMode, setGainInputMode] = useState(false); // editable dB field
  const [gainInputVal, setGainInputVal] = useState('0.0');
  const gainWindowRef = useRef(null);
  // Clip audio gain map: { clipId: db }
  const [clipGain, setClipGain] = useState({});
  // Transitions list
  const [transitions, setTransitions] = useState([]); // [{id,trackKey,centerFrame,durationFrames,type}]
  // VU meter levels (animated)
  const [vuLevels, setVuLevels] = useState([0, 0]); // [L, R] 0..1
  const [vuClip, setVuClip] = useState(false);
  const vuClipTimer = useRef(null);
  // Export window
  const [exportWindow, setExportWindow] = useState(false);
  const [exportCfg, setExportCfg] = useState({ format:'MP4', codec:'H.264', resolution:'1920x1080', fps:'30', bitrate:'8', audio:'AAC 320k' });
  const [exportFileName, setExportFileName] = useState('Meu_Projeto');
  const [exportFolder, setExportFolder] = useState('');
  const [exportProgress, setExportProgress] = useState(null); // null | { pct, label }
  // Mixer window (Shift+6)
  const [mixerWindow, setMixerWindow] = useState(false);
  const [mixerPos, setMixerPos] = useState({ x: 80, y: 80 });
  const [transitionsWindow, setTransitionsWindow] = useState(false);
  const [transWinPos, setTransWinPos] = useState({ x: 300, y: 80 });
  const [trackMixer, setTrackMixer] = useState({ v1:{gain:0,pan:0}, v2:{gain:0,pan:0}, v3:{gain:0,pan:0}, a1:{gain:0,pan:0}, a2:{gain:0,pan:0}, a3:{gain:0,pan:0} });
  const trackMixerRef = useRef({ v1:{gain:0,pan:0}, v2:{gain:0,pan:0}, v3:{gain:0,pan:0}, a1:{gain:0,pan:0}, a2:{gain:0,pan:0}, a3:{gain:0,pan:0} });
  const mixerDragRef = useRef(null);
  useEffect(() => { trackMixerRef.current = trackMixer; }, [trackMixer]);

  // Timeline tabs (multiple timelines)
  const [timelineTabs, setTimelineTabs] = useState([{ id: 'main', name: 'Timeline 1', tracks: null }]);
  const [activeTabId, setActiveTabId] = useState('main');

  // History (undo/redo)
  const [history, setHistory] = useState([]);
  const [future, setFuture] = useState([]);
  const skipHistoryRef = useRef(false);

  // Refs for animation loop
  const programVideoRef = useRef(null);
  const sourceVideoRef = useRef(null);
  const audioRefs = useRef({ a1: null, a2: null, a3: null });
  const fileInputRef = useRef(null);
  const frameRef = useRef(0.0);
  const srcFrameRef = useRef(0.0);
  const isPlayingRef = useRef(false);
  const speedRef = useRef(1);
  const srcPlayingRef = useRef(false);
  const srcPlaySpeedRef = useRef(1);
  const tracksRef = useRef(tracks);
  const zoomRef = useRef(zoom);
  const snapRef = useRef(true);
  const groupsRef = useRef(groups);
  const lockedTracksRef = useRef({});

  useEffect(() => { frameRef.current = frame; }, [frame]);
  useEffect(() => { srcFrameRef.current = sourceFrame; }, [sourceFrame]);
  useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
  useEffect(() => { srcPlayingRef.current = srcPlaying; }, [srcPlaying]);
  useEffect(() => { speedRef.current = playbackSpeed; }, [playbackSpeed]);
  useEffect(() => { tracksRef.current = tracks; }, [tracks]);
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);
  useEffect(() => { snapRef.current = snapEnabled; }, [snapEnabled]);
  useEffect(() => { groupsRef.current = groups; }, [groups]);
  useEffect(() => { lockedTracksRef.current = lockedTracks; }, [lockedTracks]);

  const toggleTrackLock = useCallback((trackKey) => {
    setLockedTracks(prev => ({ ...prev, [trackKey]: !prev[trackKey] }));
  }, []);

  /* ── MARQUEE (RECTANGLE) SELECTION ── */
  const startMarquee = useCallback((e) => {
    e.stopPropagation();
    const container = tracksAreaRef.current;
    if (!container) return;
    const containerRect = container.getBoundingClientRect();
    const scrollLeft0 = container.scrollLeft, scrollTop0 = container.scrollTop;
    const x0 = e.clientX - containerRect.left + scrollLeft0;
    const y0 = e.clientY - containerRect.top + scrollTop0;
    let moved = false;
    setMarquee({ x0, y0, x1: x0, y1: y0 });

    const move = (mv) => {
      moved = true;
      const x1 = mv.clientX - containerRect.left + container.scrollLeft;
      const y1 = mv.clientY - containerRect.top + container.scrollTop;
      setMarquee(prev => prev ? { ...prev, x1, y1 } : { x0, y0, x1, y1 });
    };

    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      if (!moved) { setMarquee(null); return; }
      setMarquee(curr => {
        if (!curr) return null;
        const left = Math.min(curr.x0, curr.x1), right = Math.max(curr.x0, curr.x1);
        const top = Math.min(curr.y0, curr.y1), bottom = Math.max(curr.y0, curr.y1);
        // Translate pixel rect into frame range (x is offset by the 110px label column)
        const fStart = (left - 110) / (4 * zoomRef.current);
        const fEnd = (right - 110) / (4 * zoomRef.current);
        // Determine which track rows intersect [top,bottom] using actual DOM rects
        const rows = container.querySelectorAll('[data-track-row]');
        const hitTracks = new Set();
        rows.forEach(row => {
          const rr = row.getBoundingClientRect();
          const rowTop = rr.top - containerRect.top + container.scrollTop;
          const rowBottom = rr.bottom - containerRect.top + container.scrollTop;
          if (rowBottom >= top && rowTop <= bottom) hitTracks.add(row.getAttribute('data-track-row'));
        });
        const picked = [];
        hitTracks.forEach(tk => {
          if (lockedTracksRef.current[tk]) return;
          (tracksRef.current[tk] || []).forEach(c => {
            const cEnd = c.startFrame + c.durationFrames;
            if (cEnd >= fStart && c.startFrame <= fEnd) picked.push({ clipId: c.clipId, trackKey: tk });
          });
        });
        setSelectedClips(picked);
        setSelectedClip(picked.length === 1 ? (tracksRef.current[picked[0].trackKey] || []).find(c => c.clipId === picked[0].clipId) : null);
        return null;
      });
    };

    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }, []);

  /* ── HISTORY (UNDO/REDO) ── */
  const pushHistory = useCallback(() => {
    setHistory(h => {
      const snap = { tracks: tracksRef.current, groups: groupsRef.current };
      const next = [...h, snap];
      return next.length > 50 ? next.slice(next.length - 50) : next;
    });
    setFuture([]);
  }, []);

  // Wrapper: call before any mutating setTracks/setGroups call to snapshot prior state
  const withHistory = useCallback((mutateFn) => {
    pushHistory();
    mutateFn();
  }, [pushHistory]);

  const undo = useCallback(() => {
    setHistory(h => {
      if (h.length === 0) return h;
      const last = h[h.length - 1];
      setFuture(f => [{ tracks: tracksRef.current, groups: groupsRef.current }, ...f]);
      setTracks(last.tracks);
      setGroups(last.groups);
      return h.slice(0, -1);
    });
  }, []);

  const redo = useCallback(() => {
    setFuture(f => {
      if (f.length === 0) return f;
      const next = f[0];
      setHistory(h => [...h, { tracks: tracksRef.current, groups: groupsRef.current }]);
      setTracks(next.tracks);
      setGroups(next.groups);
      return f.slice(1);
    });
  }, []);

  /* ── SNAP HELPER ── */
  const getSnapFrame = useCallback((rawFrame, excludeClipIds = []) => {
    if (!snapRef.current) return rawFrame;
    const th = Math.max(4, Math.round(8 / zoomRef.current));
    let best = rawFrame, bestDist = th + 1;
    const tr = tracksRef.current;
    REAL_TRACKS.forEach(td => {
      (tr[td.key] || []).forEach(c => {
        if (excludeClipIds.includes(c.clipId)) return;
        [c.startFrame, c.startFrame + c.durationFrames].forEach(snap => {
          const d = Math.abs(rawFrame - snap);
          if (d < bestDist) { bestDist = d; best = snap; }
        });
      });
    });
    // Snap to playhead
    const pd = Math.abs(rawFrame - frameRef.current);
    if (pd < bestDist) { bestDist = pd; best = Math.round(frameRef.current); }
    return best;
  }, []);

  /* ── DELETE ── */
  const deleteClip = useCallback((clip) => {
    pushHistory();
    setTracks(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const groupMates = groupsRef.current.find(g => g.includes(clip.clipId));
      REAL_TRACKS.forEach(td => {
        next[td.key] = next[td.key].filter(c => {
          const isLinked = linkedSelection && clip.linkId && c.linkId === clip.linkId;
          const isGrouped = groupMates && groupMates.includes(c.clipId);
          return !(c.clipId === clip.clipId || isLinked || isGrouped);
        });
      });
      return next;
    });
    setSelectedClip(null);
    setSelectedClips([]);
  }, [linkedSelection, pushHistory]);

  /* ── CUT (Razor) ── */
  const cutClipAt = useCallback((clip, trackKey, cutFrame) => {
    if (cutFrame <= clip.startFrame || cutFrame >= clip.startFrame + clip.durationFrames) return;
    pushHistory();
    const leftDur = cutFrame - clip.startFrame;
    const rightSrc = (clip.sourceStartFrame || 0) + leftDur;
    const newId = 'clip_' + uid();
    setTracks(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const arr = next[trackKey];
      const idx = arr.findIndex(c => c.clipId === clip.clipId);
      if (idx === -1) return prev;
      arr[idx] = { ...arr[idx], durationFrames: leftDur };
      arr.splice(idx + 1, 0, { ...JSON.parse(JSON.stringify(clip)), clipId: newId, linkId: null, startFrame: cutFrame, sourceStartFrame: rightSrc, durationFrames: clip.durationFrames - leftDur });
      return next;
    });
  }, [pushHistory]);

  /* ── QUICK CUT (Ctrl+K) ── */
  const quickCutAtPlayhead = useCallback(() => {
    const cf = Math.round(frameRef.current);
    pushHistory();
    setTracks(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      REAL_TRACKS.forEach(td => {
        next[td.key].forEach((c, i) => {
          if (cf > c.startFrame && cf < c.startFrame + c.durationFrames) {
            const leftDur = cf - c.startFrame;
            const rightSrc = (c.sourceStartFrame || 0) + leftDur;
            const newId = 'clip_' + uid();
            const right = { ...JSON.parse(JSON.stringify(c)), clipId: newId, linkId: null, startFrame: cf, sourceStartFrame: rightSrc, durationFrames: c.durationFrames - leftDur };
            next[td.key][i] = { ...next[td.key][i], durationFrames: leftDur };
            next[td.key].splice(i + 1, 0, right);
          }
        });
      });
      return next;
    });
  }, [pushHistory]);

  /* ── ZOOM TO EXTENTS (Alt+Z) ── */
  const tracksAreaRef = useRef(null);
  const zoomToExtents = useCallback(() => {
    let lastFrame = 0;
    REAL_TRACKS.forEach(td => {
      (tracksRef.current[td.key] || []).forEach(c => {
        const end = c.startFrame + c.durationFrames;
        if (end > lastFrame) lastFrame = end;
      });
    });
    if (lastFrame <= 0) lastFrame = FPS * 10;
    const container = tracksAreaRef.current;
    const availPx = container ? container.clientWidth - 110 - 20 : 1000;
    const newZoom = Math.max(0.05, Math.min(10, availPx / (lastFrame * 4)));
    setZoom(parseFloat(newZoom.toFixed(3)));
    requestAnimationFrame(() => { if (container) container.scrollLeft = 0; });
  }, []);

  /* ── KEYBOARD ── */
  useEffect(() => {
    const down = (e) => {
      if (document.activeElement.tagName === 'INPUT') return;

      // Ctrl+Shift+Z → redo
      if (e.ctrlKey && e.shiftKey && e.code === 'KeyZ') { e.preventDefault(); redo(); return; }
      // Ctrl+Z → undo
      if (e.ctrlKey && e.code === 'KeyZ') { e.preventDefault(); undo(); return; }
      // Ctrl+K → quick cut
      if (e.ctrlKey && e.code === 'KeyK') { e.preventDefault(); quickCutAtPlayhead(); return; }

      // Ctrl+Alt+D → crossfade áudio
      if (e.ctrlKey && e.altKey && e.code === 'KeyD') {
        e.preventDefault();
        let foundClip = null, foundTK = null;
        AUDIO_TRACKS.forEach(tk => {
          (tracksRef.current[tk]||[]).forEach(c => {
            if (selectedClip && c.clipId === selectedClip.clipId) { foundClip = c; foundTK = tk; }
          });
        });
        if (!foundClip && selectedClip) {
          AUDIO_TRACKS.forEach(tk => {
            (tracksRef.current[tk]||[]).forEach(c => {
              if (selectedClip.linkId && c.linkId === selectedClip.linkId) { foundClip = c; foundTK = tk; }
            });
          });
        }
        if (foundClip && foundTK) {
          // Find adjacent clip (the one ending just before or starting just after)
          const allClips = (tracksRef.current[foundTK]||[]).slice().sort((a,b)=>a.startFrame-b.startFrame);
          const idx = allClips.findIndex(c => c.clipId === foundClip.clipId);
          let centerFrame = foundClip.startFrame;
          if (idx > 0) {
            const prev2 = allClips[idx - 1];
            centerFrame = (prev2.startFrame + prev2.durationFrames + foundClip.startFrame) / 2;
          } else if (idx < allClips.length - 1) {
            const next2 = allClips[idx + 1];
            centerFrame = (foundClip.startFrame + foundClip.durationFrames + next2.startFrame) / 2;
          }
          setTransitions(prev => {
            const filtered = prev.filter(t => !(t.trackKey===foundTK && Math.abs(t.centerFrame-centerFrame)<FPS));
            return [...filtered, { id:'tr_'+uid(), trackKey:foundTK, centerFrame, durationFrames:Math.round(FPS*0.5), type:'audio-crossfade' }];
          });
        }
        return;
      }
      // Ctrl+D → dissolve vídeo
      if (e.ctrlKey && e.code === 'KeyD') {
        e.preventDefault();
        let foundClip = null, foundTK = null;
        VIDEO_TRACKS.forEach(tk => {
          (tracksRef.current[tk]||[]).forEach(c => {
            if (selectedClip && c.clipId === selectedClip.clipId) { foundClip = c; foundTK = tk; }
          });
        });
        if (foundClip && foundTK) {
          const allClips = (tracksRef.current[foundTK]||[]).slice().sort((a,b)=>a.startFrame-b.startFrame);
          const idx = allClips.findIndex(c => c.clipId === foundClip.clipId);
          let centerFrame = foundClip.startFrame;
          if (idx > 0) {
            const prev2 = allClips[idx - 1];
            centerFrame = (prev2.startFrame + prev2.durationFrames + foundClip.startFrame) / 2;
          } else if (idx < allClips.length - 1) {
            const next2 = allClips[idx + 1];
            centerFrame = (foundClip.startFrame + foundClip.durationFrames + next2.startFrame) / 2;
          }
          setTransitions(prev => {
            const filtered = prev.filter(t => !(t.trackKey===foundTK && Math.abs(t.centerFrame-centerFrame)<FPS));
            return [...filtered, { id:'tr_'+uid(), trackKey:foundTK, centerFrame, durationFrames:Math.round(FPS*0.5), type:'video-dissolve' }];
          });
        }
        return;
      }

      // Shift+6 → mixer window
      if (e.shiftKey && e.code === 'Digit6') { e.preventDefault(); setMixerWindow(p => !p); return; }

      // Alt+Z → zoom extents (fit entire timeline content to view)
      if (e.altKey && e.code === 'KeyZ') { e.preventDefault(); zoomToExtents(); return; }
      if (e.altKey) return;

      // Shift+G → ungroup
      if (e.shiftKey && e.code === 'KeyG') { e.preventDefault(); ungroupSelectedClips(); return; }

      if (e.code === 'Space') {
        e.preventDefault();
        if (focusedPanel === 'source' && sourceAsset) toggleSrcPlay();
        else { setPlaybackSpeed(1); setIsPlaying(p => !p); }
      }
      else if (e.code === 'KeyL') {
        if (focusedPanel === 'source' && sourceAsset) {
          // L: forward play on source
          if (!srcPlayingRef.current) { setSrcPlaying(true); srcPlaySpeedRef.current = 1; if(sourceVideoRef.current){sourceVideoRef.current.playbackRate=1;sourceVideoRef.current.play().catch(()=>{}); }}
          else { const ns = srcPlaySpeedRef.current<=0?1:srcPlaySpeedRef.current===1?2:4; srcPlaySpeedRef.current=ns; if(sourceVideoRef.current)sourceVideoRef.current.playbackRate=ns; }
        } else {
          if (!isPlayingRef.current || speedRef.current <= 0) { setPlaybackSpeed(1); setIsPlaying(true); }
          else if (speedRef.current === 1) setPlaybackSpeed(2);
          else if (speedRef.current === 2) setPlaybackSpeed(4);
        }
      }
      else if (e.code === 'KeyJ') {
        if (focusedPanel === 'source' && sourceAsset) {
          // J: reverse on source (just rewind by 1s for now since video el doesn't easily reverse)
          if(sourceVideoRef.current) { sourceVideoRef.current.pause(); const newT = Math.max(0, sourceVideoRef.current.currentTime - 1); sourceVideoRef.current.currentTime = newT; setSourceFrame(newT * FPS); setSrcPlaying(false); }
        } else {
          if (!isPlayingRef.current || speedRef.current >= 0) { setPlaybackSpeed(-1); setIsPlaying(true); }
          else if (speedRef.current === -1) setPlaybackSpeed(-2);
          else if (speedRef.current === -2) setPlaybackSpeed(-4);
        }
      }
      else if (e.code === 'KeyK') {
        if (focusedPanel === 'source' && sourceAsset) {
          setSrcPlaying(false); srcPlaySpeedRef.current = 1; if(sourceVideoRef.current){sourceVideoRef.current.pause();}
        } else {
          setIsPlaying(false); setPlaybackSpeed(1);
        }
      }
      else if (e.code === 'KeyG') {
        const target = selectedClip;
        if (target && (target.type === 'video' || target.type === 'audio')) {
          const targetTK = VIDEO_TRACKS.find(tk=>(tracksRef.current[tk]||[]).some(c=>c.clipId===target.clipId))
                        || AUDIO_TRACKS.find(tk=>(tracksRef.current[tk]||[]).some(c=>c.clipId===target.clipId));
          setGainWindow(prev => {
            if (prev && prev.clipId === target.clipId) return null;
            const existingDb = clipGain[target.clipId] ?? 0;
            setGainInputMode(false);
            setGainInputVal(existingDb.toFixed(1));
            return { clipId: target.clipId, trackKey: targetTK, db: existingDb, clipName: target.name, x: window.innerWidth/2 - 130, y: window.innerHeight/2 - 160 };
          });
        } else {
          groupSelectedClips();
        }
      }
      else if (e.code === 'ArrowUp') { e.preventDefault(); setZoom(z => Math.max(0.1, parseFloat((z - 0.2).toFixed(1)))); }
      else if (e.code === 'ArrowDown') { e.preventDefault(); setZoom(z => Math.min(10, parseFloat((z + 0.2).toFixed(1)))); }
      else if (e.code === 'KeyI') { if (focusedPanel === 'source') setSrcIn(Math.floor(srcFrameRef.current)); else setTlIn(Math.floor(frameRef.current)); }
      else if (e.code === 'KeyO') { if (focusedPanel === 'source') setSrcOut(Math.floor(srcFrameRef.current)); else setTlOut(Math.floor(frameRef.current)); }
      else if (e.code === 'ArrowRight') { e.preventDefault(); const d = e.shiftKey ? FPS : 1; if (focusedPanel === 'source') updateSrcFrame(srcFrameRef.current + d); else seek(Math.floor(frameRef.current) + d); }
      else if (e.code === 'ArrowLeft') { e.preventDefault(); const d = e.shiftKey ? FPS : 1; if (focusedPanel === 'source') updateSrcFrame(srcFrameRef.current - d); else seek(Math.floor(frameRef.current) - d); }
      else if (e.code === 'Home') { e.preventDefault(); if (focusedPanel === 'source') updateSrcFrame(0); else seek(0); }
      else if (e.code === 'KeyV') setActiveTool('select');
      else if (e.code === 'KeyA') setActiveTool('trackSelect');
      else if (e.code === 'KeyB') setActiveTool('ripple');
      else if (e.code === 'KeyC') setActiveTool('razor');
      else if (e.code === 'KeyZ') setActiveTool('zoom');
      else if (e.code === 'KeyY') setActiveTool('slip');
      else if (e.code === 'KeyU') setActiveTool('slide');
      else if (e.code === 'KeyS') setSnapEnabled(p => !p);
      else if (e.code === 'Delete' || e.code === 'Backspace') { if (selectedClip) deleteClip(selectedClip); }
    };
    window.addEventListener('keydown', down);
    return () => window.removeEventListener('keydown', down);
  }, [selectedClip, selectedClips, focusedPanel, sourceAsset, deleteClip, quickCutAtPlayhead, undo, redo, groupSelectedClips, ungroupSelectedClips, zoomToExtents]);

  /* ── PLAYBACK LOOP ── */
  useEffect(() => {
    let lastTime = performance.now(), animId;
    const loop = (now) => {
      if (!isPlayingRef.current) return;
      const delta = now - lastTime; lastTime = now;
      const next = frameRef.current + delta * (FPS / 1000) * speedRef.current;
      if (next >= TOTAL_FRAMES || next < 0) { setIsPlaying(false); setPlaybackSpeed(1); if (next < 0) setFrame(0); return; }
      setFrame(next);
      animId = requestAnimationFrame(loop);
    };
    if (isPlaying) { lastTime = performance.now(); animId = requestAnimationFrame(loop); }
    else {
      if (programVideoRef.current) programVideoRef.current.pause();
      Object.values(audioRefs.current).forEach(r => r && r.pause());
    }
    return () => cancelAnimationFrame(animId);
  }, [isPlaying, playbackSpeed]);

  const seek = (f) => {
    const b = Math.max(0, Math.min(TOTAL_FRAMES - 1, f));
    setFrame(b);
    if (!isPlaying && programVideoRef.current) {
      const cur = [...(tracks.v1 || []), ...(tracks.v2 || []), ...(tracks.v3 || [])].find(c => Math.floor(b) >= c.startFrame && Math.floor(b) < c.startFrame + c.durationFrames);
      if (cur) programVideoRef.current.currentTime = (b - cur.startFrame + (cur.sourceStartFrame || 0)) / FPS;
    }
  };
  const updateSrcFrame = (f) => { const b = Math.max(0, Math.min(sourceDur, f)); setSourceFrame(b); if (sourceVideoRef.current) sourceVideoRef.current.currentTime = b / FPS; };
  const toggleSrcPlay = () => {
    if (!sourceVideoRef.current || !sourceAsset) return;
    if (srcPlaying) { sourceVideoRef.current.pause(); setSrcPlaying(false); } else { sourceVideoRef.current.play(); setSrcPlaying(true); }
  };

  /* ── DRAG / SLIP / SLIDE ── */
  const handleClipMouseDown = useCallback((e, clip, trackKey) => {
    // LOCKED TRACK: block all interaction with clips on locked tracks
    if (lockedTracksRef.current[trackKey]) { e.stopPropagation(); return; }

    // RAZOR
    if (activeTool === 'razor') {
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      const rawCut = Math.round(clip.startFrame + (e.clientX - rect.left) / (4 * zoomRef.current));
      cutClipAt(clip, trackKey, rawCut);
      return;
    }

    // SHIFT+CLICK: toggle multi-selection, no drag
    if (e.shiftKey) {
      e.stopPropagation();
      setSelectedClips(prev => {
        const exists = prev.find(p => p.clipId === clip.clipId);
        if (exists) return prev.filter(p => p.clipId !== clip.clipId);
        return [...prev, { clipId: clip.clipId, trackKey }];
      });
      setSelectedClip(clip);
      return;
    }

    // SLIP (Y): slide sourceStartFrame without moving clip on timeline
    if (activeTool === 'slip') {
      e.stopPropagation();
      setSelectedClip(clip);
      setSelectedClips([]);
      pushHistory();
      const startX = e.clientX, origSrc = clip.sourceStartFrame || 0;
      const move = (mv) => {
        const delta = Math.round((mv.clientX - startX) / (4 * zoomRef.current));
        setTracks(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const c = next[trackKey]?.find(x => x.clipId === clip.clipId);
          if (c) c.sourceStartFrame = Math.max(0, origSrc + delta);
          return next;
        });
      };
      const up = (uv) => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
      return;
    }

    // SLIDE (U): move clip and trim neighbours
    if (activeTool === 'slide') {
      e.stopPropagation();
      setSelectedClip(clip);
      setSelectedClips([]);
      pushHistory();
      const startX = e.clientX, origStart = clip.startFrame;
      const move = (mv) => {
        const delta = Math.round((mv.clientX - startX) / (4 * zoomRef.current));
        const newStart = Math.max(0, origStart + delta);
        setTracks(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const arr = next[trackKey];
          const idx = arr.findIndex(c => c.clipId === clip.clipId);
          if (idx === -1) return prev;
          // Move current clip
          arr[idx].startFrame = newStart;
          // Trim left neighbour
          if (idx > 0) {
            const left = arr[idx - 1];
            const newDur = newStart - left.startFrame;
            if (newDur > 1) left.durationFrames = newDur;
          }
          // Trim right neighbour
          if (idx < arr.length - 1) {
            const right = arr[idx + 1];
            const clipEnd = newStart + arr[idx].durationFrames;
            if (right.startFrame < clipEnd) {
              right.durationFrames -= clipEnd - right.startFrame;
              right.startFrame = clipEnd;
              right.sourceStartFrame = (right.sourceStartFrame || 0) + (clipEnd - right.startFrame);
            }
          }
          return next;
        });
      };
      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
      return;
    }

    // SELECT / TRACK-SELECT drag
    e.stopPropagation();
    setSelectedClip(clip);
    const startX = e.clientX;
    let clipsToMove = [];

    // Does this clip belong to an active multi-selection? If so, drag the whole selection.
    const inMultiSel = selectedClips.some(s => s.clipId === clip.clipId);
    const groupMates = groupsRef.current.find(g => g.includes(clip.clipId));

    if (activeTool === 'trackSelect') {
      Object.keys(tracks).forEach(tk => {
        (tracks[tk] || []).forEach(c => {
          if (c.startFrame >= clip.startFrame) clipsToMove.push({ trackKey: tk, clipId: c.clipId, origStart: c.startFrame });
        });
      });
    } else if (inMultiSel && selectedClips.length > 1) {
      // Drag entire multi-selection (plus any linked partners)
      const selIds = new Set(selectedClips.map(s => s.clipId));
      Object.keys(tracks).forEach(tk => {
        (tracks[tk] || []).forEach(c => {
          const linked = linkedSelection && c.linkId && selectedClips.some(s => {
            const sc = (tracks[s.trackKey] || []).find(x => x.clipId === s.clipId);
            return sc && sc.linkId === c.linkId;
          });
          if (selIds.has(c.clipId) || linked) clipsToMove.push({ trackKey: tk, clipId: c.clipId, origStart: c.startFrame });
        });
      });
    } else if (groupMates) {
      // Drag whole group together
      Object.keys(tracks).forEach(tk => {
        (tracks[tk] || []).forEach(c => {
          const linked = linkedSelection && clip.linkId && c.linkId === clip.linkId;
          if (groupMates.includes(c.clipId) || linked) clipsToMove.push({ trackKey: tk, clipId: c.clipId, origStart: c.startFrame });
        });
      });
    } else {
      Object.keys(tracks).forEach(tk => {
        (tracks[tk] || []).forEach(c => {
          const linked = linkedSelection && clip.linkId && c.linkId === clip.linkId;
          if (c.clipId === clip.clipId || linked) clipsToMove.push({ trackKey: tk, clipId: c.clipId, origStart: c.startFrame });
        });
      });
    }

    // Track-change drag: free drag & drop of blocks between tracks (V1<>V2<>V3 and A1<>A2<>A3)
    const origTrackKey = trackKey;
    const origGroup = VIDEO_TRACKS.includes(origTrackKey) ? VIDEO_TRACKS : AUDIO_TRACKS;
    const startY = e.clientY;
    let targetTrackKey = trackKey;
    let didDrag = false;

    const move = (mv) => {
      didDrag = true;
      const rawDelta = Math.round((mv.clientX - startX) / (4 * zoomRef.current));
      // Calculate snap for the dragged clip
      const rawNewStart = clipsToMove[0].origStart + rawDelta;
      const snapped = getSnapFrame(rawNewStart, clipsToMove.map(m => m.clipId));
      const snappedDelta = snapped - clipsToMove[0].origStart;
      if (snapped !== rawNewStart) setSnapLineX(snapped * 4 * zoomRef.current);
      else setSnapLineX(null);

      // Determine vertical track-switch target (only for the primary dragged clip's group)
      const deltaY = mv.clientY - startY;
      const rowHeight = 48; // matches .track-content height
      const stepsMoved = Math.round(deltaY / rowHeight);
      const origIdx = origGroup.indexOf(origTrackKey);
      let newIdx = origIdx + stepsMoved;
      newIdx = Math.max(0, Math.min(origGroup.length - 1, newIdx));
      let candidate = origGroup[newIdx];
      // Skip locked tracks: walk back toward the original track until an unlocked one is found
      if (lockedTracksRef.current[candidate]) {
        const dir = newIdx > origIdx ? -1 : 1;
        let probe = newIdx;
        while (probe !== origIdx && lockedTracksRef.current[origGroup[probe]]) probe += dir;
        candidate = origGroup[probe];
      }
      targetTrackKey = candidate;

      setDragInfo({ toMove: clipsToMove, deltaFrames: snappedDelta, targetTrack: targetTrackKey, origTrack: origTrackKey });
    };

    const up = (uv) => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      setSnapLineX(null);
      const rawDelta = Math.round((uv.clientX - startX) / (4 * zoomRef.current));
      const rawNewStart = clipsToMove[0].origStart + rawDelta;
      const snapped = getSnapFrame(rawNewStart, clipsToMove.map(m => m.clipId));
      const snappedDelta = snapped - clipsToMove[0].origStart;

      const moved = snappedDelta !== 0 || targetTrackKey !== origTrackKey;
      if (moved && didDrag) {
        pushHistory();
        setTracks(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          if (targetTrackKey !== origTrackKey) {
            // Cross-track move: only relocate the originating track's row(s); linked
            // clips on the opposite media type keep their own track unless they too
            // belong to the group being dragged through.
            clipsToMove.forEach(m => {
              const fromArr = next[m.trackKey];
              const idx = fromArr.findIndex(c => c.clipId === m.clipId);
              if (idx === -1) return;
              const [clipObj] = fromArr.splice(idx, 1);
              clipObj.startFrame = Math.max(0, m.origStart + snappedDelta);
              const sameGroup = VIDEO_TRACKS.includes(m.trackKey) ? VIDEO_TRACKS : AUDIO_TRACKS;
              const destKey = (m.trackKey === origTrackKey) ? targetTrackKey
                : (sameGroup.includes(m.trackKey) ? m.trackKey : m.trackKey);
              next[destKey] = next[destKey] || [];
              next[destKey].push(clipObj);
            });
          } else {
            clipsToMove.forEach(m => {
              const src = next[m.trackKey]?.find(c => c.clipId === m.clipId);
              if (src) src.startFrame = Math.max(0, m.origStart + snappedDelta);
            });
          }
          return next;
        });
      }
      setDragInfo(null);
    };

    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }, [activeTool, tracks, linkedSelection, cutClipAt, getSnapFrame, selectedClips, pushHistory]);

  const getVisualStart = (clip) => {
    if (!dragInfo) return clip.startFrame;
    const d = dragInfo.toMove.find(m => m.clipId === clip.clipId);
    if (d) return Math.max(0, clip.startFrame + dragInfo.deltaFrames);
    return clip.startFrame;
  };

  // While dragging across tracks, determine per-row visibility/ghosting
  const isDraggedClip = (clip, trackKey) => {
    if (!dragInfo) return false;
    return dragInfo.toMove.some(m => m.clipId === clip.clipId && m.trackKey === trackKey);
  };
  const isDropTargetRow = (rowKey) => dragInfo && dragInfo.targetTrack === rowKey && dragInfo.targetTrack !== dragInfo.origTrack;

  /* ── GROUP / UNGROUP ── */
  const groupSelectedClips = useCallback(() => {
    if (selectedClips.length < 2) return;
    pushHistory();
    const ids = selectedClips.map(s => s.clipId);
    setGroups(prev => {
      // Remove any of these ids from existing groups first, then add the new group
      const cleaned = prev.map(g => g.filter(id => !ids.includes(id))).filter(g => g.length > 1);
      return [...cleaned, ids];
    });
  }, [selectedClips, pushHistory]);

  const ungroupSelectedClips = useCallback(() => {
    const targetId = selectedClip?.clipId || (selectedClips[0] && selectedClips[0].clipId);
    if (!targetId) return;
    pushHistory();
    setGroups(prev => prev.filter(g => !g.includes(targetId)));
  }, [selectedClip, selectedClips, pushHistory]);

  /* ── FILE IMPORT ── */
  const handleFileImport = (e) => {
    Array.from(e.target.files || []).forEach(file => {
      const url = URL.createObjectURL(file);
      const isVid = file.type.includes('video'), isAud = file.type.includes('audio');
      const a = { id: 'asset_' + uid(), name: file.name, type: isVid ? 'VID' : isAud ? 'AUD' : 'IMG', url, duration: 10, binId: bins[0]?.id || null };
      if (isVid || isAud) {
        const el = document.createElement(isVid ? 'video' : 'audio');
        el.src = url;
        el.onloadedmetadata = () => { a.duration = el.duration; setAssets(p => [...p, a]); };
      } else setAssets(p => [...p, a]);
    });
    e.target.value = '';
  };

  const handleAssetDblClick = (asset) => {
    setSourceAsset(asset); setSrcPlaying(false); setSourceFrame(0); setSrcIn(null); setSrcOut(null);
    setSourceDur(Math.round(asset.duration * FPS)); setFocusedPanel('source');
    if (sourceVideoRef.current) { sourceVideoRef.current.src = asset.url; sourceVideoRef.current.load(); }
  };

  const insertAsset = (asset, targetTrack = null, dropFrame = null) => {
    let sStart = 0, sDur = Math.round(asset.duration * FPS);
    if (sourceAsset?.id === asset.id && srcIn !== null) {
      sStart = srcIn; if (srcOut !== null && srcOut > srcIn) sDur = srcOut - srcIn;
    }
    const startFrame = dropFrame !== null ? Math.max(0, Math.floor(dropFrame)) : Math.floor(frame);
    const clipId = 'clip_' + uid(), linkId = 'link_' + uid();
    pushHistory();
    setTracks(prev => {
      const next = { ...prev };
      if (asset.type === 'VID') {
        const vt = targetTrack || 'v1';
        const at = { v1:'a1', v2:'a2', v3:'a3' }[vt] || 'a1';
        next[vt] = [...next[vt], { clipId, assetId: asset.id, name: asset.name, startFrame, sourceStartFrame: sStart, durationFrames: sDur, type: 'video', url: asset.url, linkId }];
        next[at] = [...next[at], { clipId: 'audio_'+clipId, assetId: asset.id, name: '[A] '+asset.name, startFrame, sourceStartFrame: sStart, durationFrames: sDur, type: 'audio', url: asset.url, linkId }];
      } else if (asset.type === 'AUD') {
        const at = targetTrack || 'a1';
        next[at] = [...next[at], { clipId, assetId: asset.id, name: asset.name, startFrame, sourceStartFrame: sStart, durationFrames: sDur, type: 'audio', url: asset.url }];
      } else {
        const vt = targetTrack || 'v1';
        next[vt] = [...next[vt], { clipId, assetId: asset.id, name: asset.name, startFrame, sourceStartFrame: 0, durationFrames: sDur, type: 'image', url: asset.url }];
      }
      return next;

  };

  const createBin = () => {
    const name = prompt('Nome da Bin:', `Bin ${bins.length + 1}`);

  const createNewTimelineTab = useCallback((name, initialAssets = []) => {
    const tabId = 'tab_' + uid();

    REAL_TRACKS.forEach(t => { initT[t.key] = []; });
    // Pre-populate the new timeline with assets placed sequentially

    initialAssets.forEach(asset => {

      } else if (asset.type === 'AUD') {
        initT['a1'].push({ clipId, assetId: asset.id, name: asset.name, startFrame: startF, sourceStartFrame: 0, durationFrames: dur, type: 'audio', url: asset.url });
      } else {
        initT['v1'].push({ clipId, assetId: asset.id, name: asset.name, startFrame: startF, sourceStartFrame: 0, durationFrames: dur, type: 'image', url: asset.url });
      }
      startF += dur;

    setTimelineTabs(prev => [...prev, { id: tabId, name: name || `Timeline ${prev.length + 1}`, tracks: initT }]);

  const deleteAssets = useCallback((ids) => {
    setAssets(prev => prev.filter(a => !ids.includes(a.id)));

    pushHistory();
    setTracks(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      REAL_TRACKS.forEach(td => { next[td.key] = next[td.key].filter(c => !ids.includes(c.assetId)); });

  /* ── ACTIVE CLIPS ── */
  const findActive = (f, keys) => { for (const k of keys) { const c = (tracks[k] || []).find(cl => Math.floor(f) >= cl.startFrame && Math.floor(f) < cl.startFrame + cl.durationFrames); if (c) return c; } return null; };
  const currV  = findActive(frame, ['v3','v2','v1']);
  const currA1 = findActive(frame, ['a1']);
  const currA2 = findActive(frame, ['a2']);
  const currA3 = findActive(frame, ['a3']);
  const currARef = useRef(false);
  useEffect(() => { currARef.current = !!(currA1 || currA2 || currA3); }, [currA1, currA2, currA3]);

  useEffect(() => {

    const sync = (ref, clip, trackKey) => {
      if (!ref || !ref.current) return;
      if (clip) {
        if (ref.current.src !== clip.url) ref.current.src = clip.url;
        const t = (frameRef.current - clip.startFrame + (clip.sourceStartFrame || 0)) / FPS;
        // Combine clip gain + mixer track gain
        const clipDb = clipGainRef_val[clip.clipId] ?? 0;
        const mixDb = trackMixerRef.current[trackKey]?.gain ?? 0;
        const totalDb = clipDb + mixDb;
        const linear = Math.pow(10, totalDb / 20);
        ref.current.volume = Math.max(0, Math.min(1, linear));
        if (isPlayingRef.current && speedRef.current > 0) {
          ref.current.playbackRate = speedRef.current;
          if (Math.abs(ref.current.currentTime - t) > 0.15) ref.current.currentTime = t;
          if (ref.current.paused) ref.current.play().catch(()=>{});
        } else { ref.current.pause(); ref.current.currentTime = t; }
      } else { ref.current.pause(); ref.current.removeAttribute('src'); }

  /* ── VU METER ANIMATION ── */
  const vuPeakRef = useRef([0, 0]);

    let animId;

      animId = requestAnimationFrame(tick);

        const noise = () => Math.min(1, base + Math.random() * 0.6 * (hasA ? 1 : 0));
        const l = noise(), r = noise();
        vuPeakRef.current[0] = Math.max(vuPeakRef.current[0] * 0.91, l);
        vuPeakRef.current[1] = Math.max(vuPeakRef.current[1] * 0.91, r);

          clearTimeout(vuClipTimer.current);

      } else {
        vuPeakRef.current[0] *= 0.82;
        vuPeakRef.current[1] *= 0.82;
        if (vuPeakRef.current[0] < 0.003) vuPeakRef.current[0] = 0;
        if (vuPeakRef.current[1] < 0.003) vuPeakRef.current[1] = 0;
      }
      setVuLevels([vuPeakRef.current[0], vuPeakRef.current[1]]);

  /* ── GAIN WINDOW DRAG ── */
  const startGainDrag = useCallback((e) => {

      const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };

  }, []);

  const applyGain = useCallback((db) => {

      ['a1','a2','a3'].forEach(k => {
        const el = audioRefs.current[k];
        if (el) el.volume = Math.max(0, Math.min(1, linear));
      });
      setClipGain(cg => ({ ...cg, [prev.clipId]: db }));
      return newGain;
    });
  }, []);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>
      {/* ── GAIN FLOATING WINDOW ── */}
      {gainWindow && (
        <div ref={gainWindowRef} className="gain-window" style={{ left: gainWindow.x, top: gainWindow.y }}>
          <div className="gain-window-title" onMouseDown={startGainDrag} style={{ cursor:'grab' }}>
            <span>🎚 Ganho de Áudio</span>
            <button className="gain-window-close" onMouseDown={e=>e.stopPropagation()} onClick={()=>setGainWindow(null)}>✕</button>
          </div>
          {/* Clip name display */}
          <div style={{ fontSize:'10px', color:'var(--text-muted)', background:'var(--bg-tertiary)', borderRadius:'5px', padding:'4px 8px', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', border:'1px solid var(--border)' }}>
            🎬 {gainWindow.clipName || gainWindow.clipId}

                onKeyDown={e => {

                style={{ flex:1, background:'var(--bg-tertiary)', border:'1px solid var(--accent)', color:'var(--text)', borderRadius:'5px', padding:'4px 8px', fontSize:'20px', fontFamily:'monospace', fontWeight:700, textAlign:'center', outline:'none' }}

              <span style={{ fontSize:'13px', color:'var(--text-muted)' }}>dB</span>

              <span style={{ fontSize:'9px', color:'var(--text-muted)', display:'block', marginTop:'-4px' }}>clique para editar</span>
            </div>
          )}
          <div className="gain-slider-wrap">
            <span className="gain-slider-label">-20</span>
            <input type="range" className="gain-slider" min={-20} max={20} step={0.1} value={gainWindow.db}
              style={{ background:`linear-gradient(to right,var(--accent) 0%,var(--accent) ${((gainWindow.db+20)/40)*100}%,var(--border) ${((gainWindow.db+20)/40)*100}%,var(--border) 100%)` }}
              onChange={e=>{ applyGain(parseFloat(e.target.value)); setGainInputVal(parseFloat(e.target.value).toFixed(1)); }} />
            <span className="gain-slider-label" style={{ textAlign:'left' }}>+20</span>

          {/* OK button */}
          <button onClick={()=>setGainWindow(null)} style={{ background:'var(--accent)', border:'none', color:'white', padding:'6px 0', borderRadius:'6px', cursor:'pointer', fontWeight:700, fontSize:'12px', letterSpacing:'0.5px' }}>
            ✓ OK — Aplicar Ganho
          </button>
          <div className="gain-footer">G para abrir/fechar · Arraste para mover</div>
        </div>
      )}
      {/* ── EXPORT WINDOW ── */}
      {exportWindow && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:10000,

        }} onClick={()=>setExportWindow(false)}>
          <div style={{

              <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                <input

                  onChange={e=>setExportFileName(e.target.value.replace(/[\/\\:*?"<>|]/g,'_'))}

              <span style={{ fontSize:'11px', color:'var(--text-muted)' }}>Pasta de Destino</span>
              <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
                <div style={{
                  flex:1, background:'var(--bg-tertiary)', border:'1px solid var(--border)', color: exportFolder ? 'var(--text)' : 'var(--text-muted)',

              <button onClick={()=>{
                const fname = (exportFileName || 'projeto') + '.' + exportCfg.format.toLowerCase();

                // Simulate export progress
                const steps = [
                  'Analisando clipes na timeline...',
                  `Codificando vídeo: ${exportCfg.codec} ${exportCfg.resolution}...`,
                  `Aplicando efeitos e transições...`,
                  `Mixando áudio: ${exportCfg.audio}...`,
                  `Finalizando container ${exportCfg.format}...`,
                  `Gravando arquivo: ${fname}`,
                ];
                let pct = 0;
                let stepIdx = 0;
                const totalMs = 4500;
                const interval = 80;
                const inc = 100 / (totalMs / interval);
                const timer = setInterval(() => {
                  pct = Math.min(100, pct + inc + Math.random() * inc * 0.5);
                  stepIdx = Math.min(steps.length - 1, Math.floor((pct / 100) * steps.length));
                  const remaining = Math.max(0, Math.round(((100 - pct) / 100) * (totalMs / 1000)));
                  setExportProgress({ pct, label: dest, step: steps[stepIdx], eta: pct < 100 ? `~${remaining}s restantes` : '✅ Concluído!' });
                  if (pct >= 100) {
                    clearInterval(timer);
                    setTimeout(() => setExportProgress(null), 1400);
                  }
                }, interval);
              }}

                      <div style={{ fontSize:'8px', color:'var(--text-muted)', textAlign:'center', marginBottom:'3px', letterSpacing:'0.5px' }}>PAN</div>
                      <div style={{ display:'flex', alignItems:'center', gap:'2px' }}>
                        <span style={{ fontSize:'8px', color:'var(--text-muted)' }}>L</span>
                        <input type="range" min={-1} max={1} step={0.01} value={mx.pan}
                          onChange={e => setTrackMixer(p => ({ ...p, [ch.key]: { ...p[ch.key], pan: parseFloat(e.target.value) } }))}
                          style={{ flex:1, appearance:'none', WebkitAppearance:'none', height:'3px', borderRadius:'2px', outline:'none', cursor:'pointer',
                            background:`linear-gradient(to right, var(--border) 0%, ${ch.color} ${panPct}%, var(--border) ${panPct}%, var(--border) 100%)` }}
                        />
                        <span style={{ fontSize:'8px', color:'var(--text-muted)' }}>R</span>
                      </div>
                      <div style={{ fontSize:'8px', color: ch.color, textAlign:'center', marginTop:'2px', fontFamily:'monospace' }}>
                        {mx.pan === 0 ? 'C' : mx.pan < 0 ? `L${Math.round(Math.abs(mx.pan)*100)}` : `R${Math.round(mx.pan*100)}`}
                      </div>
                    </div>

                    {/* GAIN vertical fader */}
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'4px', flex:1 }}>
                      <div style={{ fontSize:'8px', color:'var(--text-muted)', letterSpacing:'0.5px' }}>GANHO</div>
                      <div style={{ position:'relative', height:'90px', display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <input type="range" min={-20} max={20} step={0.5} value={mx.gain}
                          onChange={e => setTrackMixer(p => ({ ...p, [ch.key]: { ...p[ch.key], gain: parseFloat(e.target.value) } }))}
                          style={{ appearance:'none', WebkitAppearance:'none',
                            writingMode:'vertical-lr', direction:'rtl',
                            width:'20px', height:'80px', cursor:'pointer', outline:'none',
                            background:`linear-gradient(to top, ${ch.color} 0%, ${ch.color} ${((mx.gain+20)/40)*100}%, var(--border) ${((mx.gain+20)/40)*100}%, var(--border) 100%)`
                          }}
                        />
                      </div>
                      <div style={{ fontSize:'9px', color: mx.gain === 0 ? 'var(--text-muted)' : mx.gain > 0 ? '#4ade80' : '#f87171', fontFamily:'monospace', fontWeight:700 }}>
                        {mx.gain > 0 ? '+' : ''}{mx.gain.toFixed(1)}
                      </div>
                      <div style={{ fontSize:'7px', color:'var(--text-muted)' }}>dB</div>
                    </div>

                    {/* Reset button */}
                    <button onClick={() => setTrackMixer(p => ({ ...p, [ch.key]: { gain:0, pan:0 } }))}
                      style={{ background:'var(--bg-hover)', border:`1px solid var(--border)`, color:'var(--text-muted)',
                        borderRadius:'3px', padding:'2px 6px', cursor:'pointer', fontSize:'9px' }}>

                    </button>

      {/* ── TRANSITIONS EFFECTS WINDOW ── */}
      {transitionsWindow && (() => {
        const startTransDrag = (e) => {
          e.preventDefault();
          const ox = e.clientX - transWinPos.x, oy = e.clientY - transWinPos.y;
          const move = mv => setTransWinPos({ x: mv.clientX - ox, y: mv.clientY - oy });
          const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
          window.addEventListener('mousemove', move);
          window.addEventListener('mouseup', up);
        };
        const TRANS_VIDEO = [
          { id:'video-dissolve', name:'Dissolve', icon:'⬡', color:'var(--accent)' },
          { id:'video-fade-black', name:'Fade to Black', icon:'⬛', color:'#444' },
          { id:'video-wipe-left', name:'Wipe Esq.', icon:'◀', color:'#818cf8' },
          { id:'video-wipe-right', name:'Wipe Dir.', icon:'▶', color:'#818cf8' },
          { id:'video-push', name:'Push', icon:'⇒', color:'#a78bfa' },
          { id:'video-zoom', name:'Zoom', icon:'🔍', color:'#c4b5fd' },
        ];
        const TRANS_AUDIO = [
          { id:'audio-crossfade', name:'Crossfade', icon:'⟂', color:'var(--green)' },
          { id:'audio-fade-in', name:'Fade In', icon:'↗', color:'#4ade80' },
          { id:'audio-fade-out', name:'Fade Out', icon:'↘', color:'#86efac' },
          { id:'audio-dip', name:'Dip Silêncio', icon:'↓', color:'#14b8a6' },
        ];
        const applyTransition = (transId) => {
          if (!selectedClip) { alert('Selecione um clipe na timeline primeiro.'); return; }
          const isAudioTrans = transId.startsWith('audio');
          const searchTracks = isAudioTrans ? AUDIO_TRACKS : VIDEO_TRACKS;
          let foundClip = null, foundTK = null;
          searchTracks.forEach(tk => {
            (tracksRef.current[tk]||[]).forEach(c => {
              if (selectedClip && c.clipId === selectedClip.clipId) { foundClip = c; foundTK = tk; }
            });
          });
          if (!foundClip && !isAudioTrans) {
            // Try linked audio clip
            AUDIO_TRACKS.forEach(tk => {
              (tracksRef.current[tk]||[]).forEach(c => {
                if (selectedClip.linkId && c.linkId === selectedClip.linkId) { foundClip = c; foundTK = tk; }
              });
            });
          }
          if (!foundClip || !foundTK) return;
          const allClips = (tracksRef.current[foundTK]||[]).slice().sort((a,b)=>a.startFrame-b.startFrame);
          const idx = allClips.findIndex(c => c.clipId === foundClip.clipId);
          let centerFrame = foundClip.startFrame;
          if (idx > 0) {
            const prev2 = allClips[idx - 1];
            centerFrame = (prev2.startFrame + prev2.durationFrames + foundClip.startFrame) / 2;
          } else if (idx < allClips.length - 1) {
            const next2 = allClips[idx + 1];
            centerFrame = (foundClip.startFrame + foundClip.durationFrames + next2.startFrame) / 2;
          }
          const type = isAudioTrans ? 'audio-crossfade' : 'video-dissolve';
          setTransitions(prev => {
            const filtered = prev.filter(t => !(t.trackKey===foundTK && Math.abs(t.centerFrame-centerFrame)<FPS));
            return [...filtered, { id:'tr_'+uid(), trackKey:foundTK, centerFrame, durationFrames:Math.round(FPS*0.5), type }];
          });
        };
        return (
          <div className="trans-win" style={{ left: transWinPos.x, top: transWinPos.y }}>

                    <span className="trans-item-icon" style={{ color: t.color }}>{t.icon}</span>
                    <span className="trans-item-name">{t.name}</span>
                  </div>
                ))}
              </div>
              <div className="trans-cat">🎵 Áudio</div>
              <div className="trans-grid">
                {TRANS_AUDIO.map(t => (
                  <div key={t.id} className="trans-item"
                    draggable
                    onDragStart={e => { e.dataTransfer.setData('application/x-transition', t.id); e.dataTransfer.effectAllowed='copy'; }}
                    title={`Aplicar "${t.name}" no clipe selecionado`}
                    onClick={() => applyTransition(t.id)}>
                    <span className="trans-item-icon" style={{ color: t.color }}>{t.icon}</span>
                    <span className="trans-item-name">{t.name}</span>
                  </div>
                ))}
              </div>
              <div style={{ padding:'6px 12px 10px', fontSize:'9px', color:'var(--border)', textAlign:'center' }}>
                Clique em um efeito com clipe selecionado · Ou arraste sobre o clipe
              </div>
            </div>
          </div>
        );
      })()}
      {/* ── EXPORT PROGRESS WINDOW ── */}
      {exportProgress !== null && (
        <div style={{
          position:'fixed', bottom:'48px', right:'20px', zIndex:11000,
          background:'var(--bg-secondary)', border:'1px solid var(--accent)',
          borderRadius:'10px', padding:'16px 20px', minWidth:'300px',
          boxShadow:'0 8px 32px rgba(0,0,0,0.85)',
          display:'flex', flexDirection:'column', gap:'10px'
        }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontWeight:700, fontSize:'12px', color:'var(--accent)' }}>⬆ Exportando...</span>

          </div>

      <audio ref={r => audioRefs.current.a1 = r} style={{ display:'none' }} />

      {/* ── NAVBAR ── */}

          <button className="pill" onClick={redo} title="Refazer (Ctrl+Shift+Z)" disabled={future.length === 0} style={{ opacity: future.length === 0 ? 0.4 : 1 }}>↷ ⇧^Z</button>
        </div>

        <button className="btn-action" onClick={e=>{e.stopPropagation();setTransitionsWindow(p=>!p);}}>⬡ Efeitos</button>

        />

        <div className="monitors-section">
          {/* SOURCE */}
          <div className={`panel-container ${focusedPanel==='source'?'focused':''}`} onClick={() => setFocusedPanel('source')}>
            <div style={{ fontSize:'10px', color:'var(--text-muted)', fontWeight:600, marginBottom:'6px', display:'flex', justifyContent:'space-between' }}>

            </div>
            <div

              onDragStart={e => {

            >
              {sourceAsset && <video ref={sourceVideoRef} src={sourceAsset.url} style={{ width:'100%', height:'100%', objectFit:'contain', pointerEvents:'none' }} onTimeUpdate={() => { if(srcPlaying && sourceVideoRef.current) setSourceFrame(sourceVideoRef.current.currentTime * FPS); }} />}

                <div style={{ position:'absolute', bottom:0, left:`${(srcIn/sourceDur)*100}%`, width:`${((srcOut-srcIn)/sourceDur)*100}%`, height:'3px', background:'rgba(99,102,241,0.8)' }} />
              )}
              {sourceAsset && (
                <div style={{ position:'absolute', top:4, right:4, fontSize:'9px', color:'rgba(255,255,255,0.5)', background:'rgba(0,0,0,0.4)', padding:'2px 5px', borderRadius:'3px', pointerEvents:'none' }}>
