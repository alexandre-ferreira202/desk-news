                      🎵
                    </div>
                  )}
                </div>}
              </div>
            </div>
          </div>

          {/* PROGRAM */}
          <div className={`panel-container ${focusedPanel==='program'?'focused':''}`} onClick={() => setFocusedPanel('program')}>
            <div style={{ fontSize:'10px', color:'var(--text-muted)', fontWeight:600, marginBottom:'6px', display:'flex', justifyContent:'space-between' }}>
              <span>PROGRAM {playbackSpeed !== 1 ? `(${playbackSpeed}x)` : ''}</span>
              <span style={{ color:'var(--accent)', fontFamily:'monospace' }}>{formatTC(frame)}</span>
            </div>
            <div style={{ position:'relative', flex:1, minHeight:0, backgroundColor:'#000', borderRadius:'4px', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <video ref={programVideoRef} style={{ width:'100%', height:'100%', objectFit:'contain', display:currV?'block':'none' }} muted controls={false} />
              {!currV && <div style={{ color:'#111', fontSize:'28px' }}></div>}
            </div>
            <div style={{ flexShrink:0, display:'flex', justifyContent:'center', marginTop:'8px', gap:'6px' }}>
              <button className="btn-action" onClick={()=>{setPlaybackSpeed(-1);setIsPlaying(true);}}>⏪</button>
              <button className={`btn-action ${!isPlaying?'primary':''}`} onClick={()=>{setIsPlaying(false);setPlaybackSpeed(1);}}>⏸</button>
              <button className={`btn-action ${isPlaying&&playbackSpeed>0?'primary':''}`} onClick={()=>{setPlaybackSpeed(1);setIsPlaying(true);}}>▶</button>

      </div>

      {/* ── TIMELINE ── */}
      <div className="timeline-container" onClick={() => { if(focusedPanel!=='timeline') setFocusedPanel('timeline'); setSelectedClips([]); if(srcPlaying){ setSrcPlaying(false); if(sourceVideoRef.current) sourceVideoRef.current.pause(); } }}>
        {/* TIMELINE TABS */}
        <div style={{ display:'flex', alignItems:'stretch', background:'var(--bg-primary)', borderBottom:'1px solid var(--border)', height:'28px', overflow:'hidden', flexShrink:0 }}>
          {timelineTabs.map(tab => (
            <div key={tab.id}
              onClick={e => { e.stopPropagation(); setActiveTabId(tab.id); }}
              style={{
                display:'flex', alignItems:'center', gap:'6px', padding:'0 12px',
                borderRight:'1px solid var(--border)', cursor:'pointer', fontSize:'11px',
                background: activeTabId===tab.id ? 'var(--bg-secondary)' : 'var(--bg-primary)',
                color: activeTabId===tab.id ? 'var(--text)' : 'var(--text-muted)',
                borderTop: activeTabId===tab.id ? '2px solid var(--accent)' : '2px solid transparent',
                userSelect:'none', flexShrink:0, whiteSpace:'nowrap',
              }}>
              📋 {tab.name}
              {tab.id !== 'main' && (
                <span onClick={e => { e.stopPropagation(); setTimelineTabs(prev => { const n = prev.filter(t=>t.id!==tab.id); if(activeTabId===tab.id) setActiveTabId(n[n.length-1].id); return n; }); }}
                  style={{ fontSize:'10px', color:'var(--text-muted)', marginLeft:'2px', padding:'0 2px', borderRadius:'2px', lineHeight:1 }}
                  title="Fechar tab">✕</span>
              )}
            </div>
          ))}
          <button onClick={e=>{e.stopPropagation();createNewTimelineTab();}}
            style={{ padding:'0 10px', background:'transparent', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:'14px', lineHeight:1, flexShrink:0 }}
            title="Nova Timeline">＋</button>
        </div>
        <div className="timeline-toolbar">
          <span style={{ fontSize:'10px', color:'var(--text-muted)' }}>2h · 30fps · {TOTAL_FRAMES.toLocaleString()} frames</span>
          <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
            <span style={{ fontSize:'10px', color:'var(--text-muted)' }}>Zoom</span>
            <input type="range" min="0.1" max="10" step="0.05" value={zoom} onChange={e=>setZoom(parseFloat(e.target.value))} style={{ width:'80px', accentColor:'var(--accent)' }} />
            <span style={{ fontSize:'10px', color:'var(--accent)', fontFamily:'monospace', minWidth:'34px' }}>{zoom.toFixed(1)}x</span>
          </div>
        </div>

        <div className={`timeline-layout`} style={{ borderTop: focusedPanel==='timeline' ? '1px solid var(--accent)' : '1px solid transparent' }}>
          {/* TOOLBOX */}
          <div className="toolbox-vertical">
            <button className={`tool-btn ${activeTool==='select'?'active':''}`} title="Seleção (V)" onClick={()=>setActiveTool('select')}>⬈</button>
            <button className={`tool-btn ${activeTool==='trackSelect'?'active':''}`} title="Adiante (A)" onClick={()=>setActiveTool('trackSelect')}>⇉</button>
            <button className={`tool-btn ${activeTool==='ripple'?'active':''}`} title="Ripple (B)" onClick={()=>setActiveTool('ripple')}>⇎</button>
            <button className={`tool-btn ${activeTool==='razor'?'active':''}`} title="Navalha (C)" onClick={()=>setActiveTool('razor')}>✂</button>
            <div className="tool-divider" />
            <button className={`tool-btn ${activeTool==='slip'?'active':''}`} title="Slip (Y)" onClick={()=>setActiveTool('slip')} style={{ fontSize:'11px', fontWeight:700 }}>SL</button>
            <button className={`tool-btn ${activeTool==='slide'?'active':''}`} title="Slide (U)" onClick={()=>setActiveTool('slide')} style={{ fontSize:'11px', fontWeight:700 }}>SD</button>
            <div className="tool-divider" />
            <button className={`tool-btn ${activeTool==='zoom'?'active':''}`} title="Zoom (Z)" onClick={()=>setActiveTool('zoom')}>⌕</button>
          </div>

          {/* TRACKS AREA */}
          <div className="timeline-tracks-area" ref={tracksAreaRef}>
            {/* RULER — 2 rows: metric bar on top, timecode on bottom */}
            <div className="ruler" style={{ display:'flex', flexDirection:'column', height:'38px', position:'sticky', top:0, zIndex:20 }}>
              {/* ROW 1: Metric ticks with In/Out markers */}
              <div className="ruler-metric-bar">
                <div style={{ background:'#0a0a10', borderRight:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 8px', fontSize:'8px', color:'var(--text-muted)', fontWeight:700, letterSpacing:'0.5px' }}>
                  {tlIn !== null ? <span style={{ color:'var(--green)' }}>IN {formatTC(tlIn).substring(3,8)}</span> : <span>MÉTRICA</span>}
                </div>
                <div style={{ position:'relative', width:`${TOTAL_FRAMES*4*zoom}px`, height:'100%', overflow:'hidden' }}>
                  {/* In/Out range highlight */}
                  {tlIn !== null && tlOut !== null && (
                    <div style={{ position:'absolute', top:0, bottom:0, left:`${tlIn*4*zoom}px`, width:`${(tlOut-tlIn)*4*zoom}px`, background:'rgba(99,102,241,0.18)', borderLeft:'2px solid var(--accent)', borderRight:'2px solid var(--accent)', zIndex:22, pointerEvents:'none' }} />
                  )}
                  {/* Sub-ticks (every 5 frames) */}
                  {zoom > 1 && Array.from({ length: Math.ceil(TOTAL_FRAMES / 5) }).map((_,i) => (
                    <div key={'s'+i} style={{ position:'absolute', left:`${i*5*4*zoom}px`, bottom:0, width:'1px', height:'4px', background:'rgba(255,255,255,0.12)' }} />
                  ))}
                  {/* Main ticks */}
                  {Array.from({ length: Math.ceil(TOTAL_FRAMES/rulerInterval) }).map((_,i) => (
                    <div key={i} style={{ position:'absolute', left:`${i*rulerInterval*4*zoom}px`, bottom:0, width:'1px', height:'9px', background:'rgba(255,255,255,0.3)' }} />
                  ))}
                  {/* IN marker */}
                  {tlIn !== null && (
                    <>
                      <div className="ruler-in-marker" style={{ left:`${tlIn*4*zoom}px` }} title={`IN: ${formatTC(tlIn)}`} onClick={()=>setTlIn(null)} />
                      <span className="ruler-in-label" style={{ left:`${tlIn*4*zoom}px` }}>I</span>
                    </>
                  )}
                  {/* OUT marker */}
                  {tlOut !== null && (
                    <>
                      <div className="ruler-out-marker" style={{ left:`${tlOut*4*zoom}px` }} title={`OUT: ${formatTC(tlOut)}`} onClick={()=>setTlOut(null)} />
                      <span className="ruler-out-label" style={{ left:`${tlOut*4*zoom}px` }}>O</span>
                    </>
                  )}
                </div>
              </div>
              {/* ROW 2: Timecodes — click to seek */}
              <div className="ruler-timecode-bar">
                <div style={{ background:'var(--bg-secondary)', borderRight:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 8px', fontSize:'9px', color:'var(--accent)', fontFamily:'monospace' }}>
                  {formatTC(frame)}
                </div>
                <div style={{ position:'relative', width:`${TOTAL_FRAMES*4*zoom}px`, height:'100%', cursor:'pointer' }}
                  onClick={e => { const r=e.currentTarget.getBoundingClientRect(); seek((e.clientX-r.left)/(4*zoom)); }}>
                  {Array.from({ length: Math.ceil(TOTAL_FRAMES/rulerInterval) }).map((_,i) => (
                    <div key={i} style={{ position:'absolute', left:`${i*rulerInterval*4*zoom}px`, bottom:0, height:'100%' }}>
                      <div className="ruler-tick" style={{ height:'5px', background:'var(--text-muted)' }} />
                      <span className="ruler-text">{formatTC(i*rulerInterval).substring(0,8)}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* PLAYHEAD */}
            <div className="playhead" style={{ transform:`translateX(${110 + frame*4*zoom}px)` }} />
            {/* SNAP LINE */}
            {snapLineX !== null && <div className="snap-line" style={{ transform:`translateX(${110 + snapLineX}px)` }} />}
            {/* MARQUEE RECT */}
            {marquee && (
              <div className="marquee-rect" style={{
                left: `${Math.min(marquee.x0, marquee.x1)}px`,
                top: `${Math.min(marquee.y0, marquee.y1)}px`,
                width: `${Math.abs(marquee.x1 - marquee.x0)}px`,
                height: `${Math.abs(marquee.y1 - marquee.y0)}px`,
              }} />
            )}

            {/* TRACK ROWS */}
            <div style={{ display:'flex', flexDirection:'column' }}>
              {REAL_TRACKS.map(td => {
                const isAudio = td.type === 'audio';
                const isDropRow = isDropTargetRow(td.key);
                const isLocked = !!lockedTracks[td.key];
                return (
                  <div key={td.key} className="track-row" data-track-row={td.key} style={{ borderBottom:`1px solid var(--border)` }}>
                    <div className="track-label" style={{ background: isDropRow ? 'rgba(34,197,94,0.12)' : 'var(--bg-secondary)' }}>
                      <span className="track-id" style={{ color: isAudio ? '#86efac' : '#a5b4fc' }}>{td.id}</span>
                      <button
                        className={`lock-btn ${isLocked ? 'locked' : ''}`}
                        title={isLocked ? 'Destravar trilha' : 'Travar trilha'}
                        onClick={e => { e.stopPropagation(); toggleTrackLock(td.key); }}
                        onMouseDown={e => e.stopPropagation()}
                      >{isLocked ? '🔒' : '🔓'}</button>
                    </div>
                    <div
                      className={`track-content ${activeTool==='razor'?'razor-cur':''} ${(sourceDragActive || true) && (VIDEO_TRACKS.includes(td.key) || AUDIO_TRACKS.includes(td.key)) ? 'drop-eligible' : ''} ${isLocked ? 'locked' : ''}`}
                      style={{ width:`${TOTAL_FRAMES*4*zoom}px`, background: (dropPreview && dropPreview.trackKey === td.key) ? 'rgba(165,180,252,0.10)' : isDropRow ? 'rgba(34,197,94,0.06)' : td.bg }}
                      onMouseDown={e => {
                        if (isLocked) return;
                        // Only start marquee on empty background with select tool, left button, no modifier-handled elsewhere
                        if (e.button !== 0) return;
                        if (activeTool === 'zoom' || activeTool === 'razor' || activeTool === 'slip' || activeTool === 'slide') return;
                        startMarquee(e);
                      }}
                      onClick={e => {
                        if (activeTool === 'zoom') {
                          const r = e.currentTarget.getBoundingClientRect();
                          seek((e.clientX-r.left)/(4*zoom));
                          setZoom(z => Math.min(10, parseFloat((z*1.5).toFixed(2))));
                        }
                      }}
                      onDragOver={e => {
                        if (isLocked) return;
                        const hasBinAsset = e.dataTransfer.types.includes('application/x-bin-asset');
                        const hasSrcAsset = e.dataTransfer.types.includes('application/x-source-asset');
                        if (!hasBinAsset && !hasSrcAsset) return;
                        if (hasSrcAsset && !sourceAsset) return;
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'copy';
                        const r = e.currentTarget.getBoundingClientRect();
                        const dropFrame = Math.max(0, (e.clientX - r.left) / (4 * zoomRef.current));
                        setDropPreview(prev => {
                          if (prev && prev.trackKey === td.key && Math.abs(prev.frame - dropFrame) < 2) return prev;
                          return { trackKey: td.key, frame: dropFrame };
                        });
                      }}
                      onDragLeave={e => {
                        setDropPreview(prev => (prev && prev.trackKey === td.key) ? null : prev);
                      }}
                      onDrop={e => {
                        if (isLocked) return;
                        e.preventDefault();
                        setDropPreview(null);
                        const r = e.currentTarget.getBoundingClientRect();
                        const dropFrame = (e.clientX - r.left) / (4 * zoomRef.current);
                        // Bin asset drag
                        const binAssetId = e.dataTransfer.getData('application/x-bin-asset');
                        if (binAssetId) {
                          const asset = assets.find(a => a.id === binAssetId);
                          if (asset) { insertAsset(asset, td.key, dropFrame); }
                          return;
                        }
                        // Source monitor drag
                        const assetId = e.dataTransfer.getData('application/x-source-asset');
                        if (!assetId || !sourceAsset) { setSourceDragActive(false); return; }
                        if (assetId !== sourceAsset.id) { setSourceDragActive(false); return; }
                        const srcMode = e.dataTransfer.getData('application/x-source-mode'); // 'video', 'audio', or ''
                        const isVideoTrack = VIDEO_TRACKS.includes(td.key);
                        const isAudioTrack = AUDIO_TRACKS.includes(td.key);
                        // If mode is specified, only allow drop on matching track type
                        if (srcMode === 'video' && !isVideoTrack) { setSourceDragActive(false); return; }
                        if (srcMode === 'audio' && !isAudioTrack) { setSourceDragActive(false); return; }
                        // Insert with mode override
                        const sStart = srcIn !== null ? srcIn : 0;
                        let sDur = Math.round(sourceAsset.duration * FPS);
                        if (srcIn !== null && srcOut !== null && srcOut > srcIn) sDur = srcOut - srcIn;
                        const clipId2 = 'clip_' + uid();
                        pushHistory();
                        setTracks(prev => {
                          const next = { ...prev };
                          if (srcMode === 'video') {
                            next[td.key] = [...(next[td.key]||[]), { clipId: clipId2, assetId: sourceAsset.id, name: sourceAsset.name, startFrame: Math.max(0,Math.floor(dropFrame)), sourceStartFrame: sStart, durationFrames: sDur, type: 'video', url: sourceAsset.url }];
                          } else if (srcMode === 'audio') {
                            next[td.key] = [...(next[td.key]||[]), { clipId: clipId2, assetId: sourceAsset.id, name: '[A] '+sourceAsset.name, startFrame: Math.max(0,Math.floor(dropFrame)), sourceStartFrame: sStart, durationFrames: sDur, type: 'audio', url: sourceAsset.url }];
                          } else {
                            insertAsset(sourceAsset, td.key, dropFrame);
                          }
                          return next;
                        });
                        setSourceDragActive(false);
                      }}
                    >
                      {(tracks[td.key] || []).map(clip => {
                        const dragging = isDraggedClip(clip, td.key);
                        // If this clip is being dragged to a different track, render it on the target row instead
                        if (dragging && dragInfo.targetTrack !== td.key) return null;
                        const isMultiSel = selectedClips.some(s => s.clipId === clip.clipId);
                        const isGrouped = groups.some(g => g.includes(clip.clipId));
                        return (
                          <div
                            key={clip.clipId}
                            className={`timeline-block ${TOOL_CURSOR[activeTool] || 'can-drag'} ${selectedClip?.clipId===clip.clipId?'active':''} ${isMultiSel?'multi-selected':''} ${isGrouped?'grouped':''} ${dragging?'drop-target':''}`}
                            style={{
                              left:`${getVisualStart(clip)*4*zoom}px`,
                              width:`${Math.max(2, clip.durationFrames*4*zoom)}px`,
                              background: td.color,
                              borderColor: td.border,
                            }}
                            onMouseDown={e => handleClipMouseDown(e, clip, td.key)}
                            onDragOver={e => { if(e.dataTransfer.types.includes('application/x-transition')) { e.preventDefault(); e.dataTransfer.dropEffect='copy'; } }}
                            onDrop={e => {
                              const tid = e.dataTransfer.getData('application/x-transition');
                              if (!tid) return;
                              e.preventDefault(); e.stopPropagation();
                              const isAudioTrans = tid.startsWith('audio');
                              const allClipsInTrack = (tracksRef.current[td.key]||[]).slice().sort((a,b)=>a.startFrame-b.startFrame);
                              const idx2 = allClipsInTrack.findIndex(c=>c.clipId===clip.clipId);
                              let centerFrame = clip.startFrame;
                              if (idx2 > 0) { const p2=allClipsInTrack[idx2-1]; centerFrame=(p2.startFrame+p2.durationFrames+clip.startFrame)/2; }
                              else if (idx2 < allClipsInTrack.length-1) { const n2=allClipsInTrack[idx2+1]; centerFrame=(clip.startFrame+clip.durationFrames+n2.startFrame)/2; }
                              const ttype = isAudioTrans ? 'audio-crossfade' : 'video-dissolve';
                              setTransitions(prev => { const f=prev.filter(t=>!(t.trackKey===td.key&&Math.abs(t.centerFrame-centerFrame)<FPS)); return [...f,{id:'tr_'+uid(),trackKey:td.key,centerFrame,durationFrames:Math.round(FPS*0.5),type:ttype}]; });
                            }}
                          >
                            {isAudio && <div className="audio-waveform" />}
                            <span className="block-title">{clip.name}</span>
                            {clip.durationFrames*4*zoom > 70 && <span className="block-tc">{formatTC(clip.durationFrames)}</span>}
                          </div>
                        );
                      })}
                      {/* Ghost preview of clips being dragged INTO this row from another track */}
                      {dragInfo && isDropRow && dragInfo.toMove
                        .filter(m => VIDEO_TRACKS.includes(td.key) ? VIDEO_TRACKS.includes(m.trackKey) : AUDIO_TRACKS.includes(m.trackKey))
                        .map(m => {
                          const srcClip = (tracksRef.current[m.trackKey] || []).find(c => c.clipId === m.clipId);
                          if (!srcClip) return null;
                          const visStart = Math.max(0, srcClip.startFrame + dragInfo.deltaFrames);
                          return (
                            <div
                              key={'ghost_'+m.clipId}
                              className="timeline-block drop-target"
                              style={{
                                left:`${visStart*4*zoom}px`,
                                width:`${Math.max(2, srcClip.durationFrames*4*zoom)}px`,
                                background: td.color,
                                borderColor: td.border,
                                opacity: 0.85,
                                pointerEvents: 'none',
                              }}
                            >
                              {isAudio && <div className="audio-waveform" />}
                              <span className="block-title">{srcClip.name}</span>
                            </div>
                          );
                        })}
                      {/* Drop preview highlight: shows exactly where the SOURCE clip will land */}
                      {dropPreview && dropPreview.trackKey === td.key && sourceAsset && (() => {
                        let sDur = Math.round(sourceAsset.duration * FPS);
                        if (srcIn !== null && srcOut !== null && srcOut > srcIn) sDur = srcOut - srcIn;
                        return (
                          <div
                            className="timeline-block drop-preview"
                            style={{
                              left: `${dropPreview.frame*4*zoom}px`,
                              width: `${Math.max(2, sDur*4*zoom)}px`,
                              background: td.color,
                              borderColor: '#a5b4fc',
                              pointerEvents: 'none',
                            }}
                          >
                            <span className="block-title">{sourceAsset.name}</span>
                          </div>
                        );
                      })()}
                      {/* TRANSITIONS */}
                      {transitions.filter(tr=>tr.trackKey===td.key).map(tr => {
                        const leftPx = (tr.centerFrame - tr.durationFrames/2)*4*zoom;
                        const widthPx = Math.max(6, tr.durationFrames*4*zoom);
                        return (
                          <div key={tr.id} className={`transition-block ${tr.type}`} style={{ left:`${leftPx}px`, width:`${widthPx}px` }}
                            title={tr.type==='video-dissolve'?'Fusão (Dissolve)':'Crossfade de Áudio'}>
                            <span className="transition-label">{tr.type==='video-dissolve'?'⬡ Fusão':'⟂ Fade'}</span>
                          </div>
                        );
                      })}
                      {/* GAIN BADGE on clips with gain applied */}
                      {isAudio && (tracks[td.key]||[]).map(clip => clipGain[clip.clipId] && clipGain[clip.clipId] !== 0 ? (
                        <div key={'gb_'+clip.clipId} style={{
                          position:'absolute', top:2, left:`${getVisualStart(clip)*4*zoom + 3}px`,
                          fontSize:'8px', fontWeight:700, color: clipGain[clip.clipId]>0 ? '#4ade80' : '#f87171',
                          background:'rgba(0,0,0,0.6)', borderRadius:'3px', padding:'0 3px', zIndex:8, pointerEvents:'none',
                        }}>{clipGain[clip.clipId]>0?'+':''}{clipGain[clip.clipId].toFixed(1)}dB</div>
                      ) : null)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* VU METER PANEL */}
          <div className="vu-panel">
            <div className={`vu-clip-led ${vuClip?'clipping':''}`} title="CLIP" />
            <div className="vu-meters">
              {['L','R'].map((ch, ci) => (
                <div key={ch} className="vu-bar-wrap">
                  <div className="vu-bar-track">
                    <div className={`vu-bar-fill ch-${ch.toLowerCase()}`} style={{ height:`${(vuLevels[ci]||0)*100}%` }} />
                  </div>
                  <span className="vu-ch-label">{ch}</span>
                </div>
              ))}
            </div>
            <div className="vu-label">VU</div>
          </div>
        </div>
      </div>

      {/* ── STATUSBAR ── */}
      <div className="statusbar">
        <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
          <div className={`status-dot ${isPlaying?'playing':''}`} />
          <span>{isPlaying?`▶ ${playbackSpeed}x`:'Pronto'}</span>
        </div>
        <span>TC: <span style={{ color:'var(--accent)', fontFamily:'monospace' }}>{formatTC(frame)}</span></span>
        <span style={{ color: snapEnabled ? 'var(--green)' : 'var(--border)' }}>🧲 {snapEnabled?'Snap':'─'}</span>
        <span style={{ color: linkedSelection ? 'var(--accent)' : 'var(--text-muted)' }}>🔗 {linkedSelection?'Vinculado':'Livre'}</span>
        <span style={{ flex:1, textAlign:'right' }}>
          [J·K·L] Play · [Y] Slip · [U] Slide · [S] Snap · [G] Ganho · [⇧G] Desagrupar · [^D] Fusão · [^⌥D] Fade Áudio · [^K] Corte · [Del] Apagar · [⇧6] Mesa de Som
        </span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
